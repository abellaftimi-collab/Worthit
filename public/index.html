:root{
  --void:#050308;
  --deep:#08050f;
  --ink:#f6f3fb;
  --ink-dim:rgba(246,243,251,.58);
  --ink-faint:rgba(246,243,251,.36);
  --line:rgba(255,255,255,.09);
  --line-soft:rgba(255,255,255,.06);
  --glass:rgba(255,255,255,.03);
  --glass-hi:rgba(255,255,255,.06);
  --v1:#a78bfa;
  --v2:#7c3aed;
  --v3:#2e1065;
  --gold-1:#fbcd6b;
  --gold-2:#e4a11b;
  --accent-1:var(--v1);
  --accent-2:var(--v2);
  --grad:linear-gradient(135deg,var(--accent-1) 0%,var(--accent-2) 100%);
  --grad-gold:linear-gradient(135deg,var(--gold-1) 0%,var(--gold-2) 100%);
  --r-s:10px;--r-m:16px;--r-l:22px;--r-xl:28px;--pill:999px;
  --ease:cubic-bezier(.22,1,.36,1);
  --font-d:'Unbounded',ui-sans-serif,system-ui,sans-serif;
  --font-b:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--void);}
body{font-family:var(--font-b);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
h1,h2,h3{font-family:var(--font-d);text-wrap:balance;margin:0;}
p{margin:0;}
button,input{font-family:inherit;}
::selection{background:rgba(167,139,250,.3);color:#fff;}
a{color:inherit;}
.tabular{font-variant-numeric:tabular-nums;}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;}
#modal-root{position:relative;z-index:80;}
#toast-root{position:fixed;right:18px;bottom:96px;z-index:90;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
#confetti-root{position:fixed;inset:0;z-index:95;pointer-events:none;overflow:hidden;}

.glass{background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.container{max-width:1120px;margin:0 auto;padding:0 24px;}
.section{padding:150px 24px 100px;position:relative;}
.section-tight{padding:90px 24px 90px;}
.eyebrow{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--v1);margin:0 0 14px;font-weight:600;}
.h2{font-size:clamp(2rem,4.5vw,2.9rem);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.12;}
.lede{font-size:15.5px;line-height:1.65;color:var(--ink-dim);}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.gold-text{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
.center{text-align:center;margin-left:auto;margin-right:auto;}

@keyframes pageIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.page-enter{animation:pageIn .5s var(--ease) both;}

@keyframes spinSlow{to{transform:rotate(360deg);}}
.spin-slow{animation:spinSlow 34s linear infinite;transform-origin:center;}
@keyframes spinSlowRev{to{transform:rotate(-360deg);}}
.spin-slow-rev{animation:spinSlowRev 46s linear infinite;transform-origin:center;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.float{animation:floatY 6s ease-in-out infinite;}

.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ---- 3D hero scene ---- */
/* ---- hero produit : mockup de la pause Worthit ---- */
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;}
.hero-up{opacity:0;transform:translateY(22px);animation:heroUp .7s var(--ease) both;}
@keyframes heroUp{to{opacity:1;transform:translateY(0);}}
.mock-wrap{position:relative;display:flex;justify-content:center;padding:30px 0;}
.mock-glow{position:absolute;width:460px;height:460px;left:50%;top:50%;translate:-50% -50%;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.22) 0%,transparent 65%);pointer-events:none;}
.mock-ring{position:absolute;left:50%;top:50%;translate:-50% -50%;width:520px;height:520px;border:1px dashed rgba(167,139,250,.15);border-radius:50%;animation:spinSlow 70s linear infinite;pointer-events:none;}
.mock-card{position:relative;width:min(372px,100%);background:linear-gradient(165deg,rgba(26,16,44,.97),rgba(12,7,22,.97));border:1px solid rgba(167,139,250,.26);border-radius:24px;padding:22px;box-shadow:0 40px 90px rgba(0,0,0,.55),0 0 50px rgba(124,58,237,.12);animation:mockFloat 7s ease-in-out infinite;}
@keyframes mockFloat{0%,100%{transform:translateY(0) rotate(-.5deg);}50%{transform:translateY(-9px) rotate(.5deg);}}
.mock-shine{position:absolute;inset:0;border-radius:24px;overflow:hidden;pointer-events:none;}
.mock-shine::before{content:"";position:absolute;top:0;bottom:0;left:-70%;width:45%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.045),transparent);animation:mockShine 6s ease-in-out infinite;}
@keyframes mockShine{0%,55%,100%{left:-70%;}28%{left:120%;}}
.mock-chip{position:absolute;display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:999px;background:rgba(14,9,26,.94);border:1px solid rgba(167,139,250,.3);font-size:12px;font-weight:600;color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.45);white-space:nowrap;z-index:2;}
.mock-chip.c1{top:6px;right:-6px;animation:chipFloat 6s ease-in-out infinite;}
.mock-chip.c2{bottom:6px;left:-10px;animation:chipFloat 6s ease-in-out 1.8s infinite;}
@keyframes chipFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@media (max-width:920px){
  .hero-grid{grid-template-columns:1fr;gap:40px;}
  .hero-l{text-align:center;}
  .hero-cta,.hero-trust{justify-content:center;}
  .mock-ring{width:440px;height:440px;}
}
@media (max-width:480px){.mock-chip.c1{right:0;}.mock-chip.c2{left:0;}}

.tilt{transition:transform .35s var(--ease),box-shadow .35s ease,border-color .35s ease;transform-style:preserve-3d;will-change:transform;}

.feature-card{position:relative;overflow:hidden;}
.feature-card::before{content:"";position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.8),transparent);opacity:0;transition:opacity .35s ease;}
.feature-card:hover{border-color:rgba(167,139,250,.4);box-shadow:0 0 30px rgba(124,58,237,.14),0 20px 46px rgba(0,0,0,.5);}
.feature-card:hover::before{opacity:1;}
.feature-card.locked{opacity:.68;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-weight:700;border-radius:var(--pill);transition:box-shadow .3s ease,transform .3s ease,filter .3s ease;font-size:14.5px;padding:13px 26px;}
.btn-neon{background:var(--grad);color:#fff;}
.btn-neon:hover{box-shadow:0 0 26px rgba(167,139,250,.42),0 0 60px rgba(124,58,237,.22);transform:translateY(-2px);filter:brightness(1.05);}
.btn-gold{background:var(--grad-gold);color:#1a1206;}
.btn-gold:hover{box-shadow:0 0 26px rgba(251,205,107,.45),0 0 60px rgba(228,161,27,.25);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.16);}
.btn-ghost:hover{border-color:rgba(167,139,250,.55);box-shadow:0 0 20px rgba(167,139,250,.16);transform:translateY(-2px);}
.btn-sm{padding:9px 18px;font-size:13px;}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.btn-block{width:100%;}

.nav-link{position:relative;transition:color .25s ease;background:none;border:none;cursor:pointer;font-size:14px;font-family:inherit;}
.nav-link::after{content:"";position:absolute;left:0;bottom:-6px;height:1px;width:0;background:var(--grad);transition:width .3s ease;}
.nav-link:hover::after,.nav-link.active::after{width:100%;}

.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--pill);font-size:12.5px;}
.badge-premium{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:var(--pill);font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;background:var(--grad-gold);color:#1a1206;}

.filter-pill{transition:all .3s ease;cursor:pointer;border:1px solid var(--line);background:var(--glass);color:var(--ink-dim);font-size:13.5px;padding:9px 20px;border-radius:var(--pill);font-family:inherit;}
.filter-pill.active{background:linear-gradient(135deg,rgba(167,139,250,.18),rgba(124,58,237,.18));border-color:rgba(167,139,250,.55);color:#fff;box-shadow:0 0 16px rgba(124,58,237,.14);}

.show-card{overflow:hidden;border-radius:20px;}
.field{position:relative;margin-bottom:16px;}
.field input{width:100%;background:rgba(255,255,255,.03);color:#fff;border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:22px 44px 10px 16px;font-size:15px;outline:none;transition:border-color .3s ease,box-shadow .3s ease;font-family:inherit;}
.field input.no-icon{padding-right:16px;}
.field input:focus{border-color:rgba(167,139,250,.6);box-shadow:0 0 16px rgba(124,58,237,.14);}
.field input.error{border-color:rgba(255,100,100,.7);}
.field label{position:absolute;left:16px;top:18px;font-size:15px;color:var(--ink-faint);pointer-events:none;transition:all .2s ease;}
.field input:focus + label,.field input:not(:placeholder-shown) + label{top:8px;font-size:11px;color:var(--v1);letter-spacing:.06em;text-transform:uppercase;}
.field .field-icon{position:absolute;right:14px;top:20px;color:rgba(255,255,255,.35);}
.field .field-toggle{position:absolute;right:12px;top:16px;background:none;border:none;cursor:pointer;padding:4px;display:flex;color:rgba(255,255,255,.4);}
.field-error{font-size:12px;color:#ff8a8a;margin:6px 2px 0;}

@keyframes checkPop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;}}
.check-pop{animation:checkPop .6s var(--ease) both;}
@keyframes drawRing{from{stroke-dashoffset:220;}to{stroke-dashoffset:0;}}
.draw-ring{stroke-dasharray:220;animation:drawRing .9s ease-out .1s both;}

.burger-line{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:transform .3s ease,opacity .3s ease;}
@keyframes menuIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.menu-in{animation:menuIn .3s ease both;}

.tab-btn{flex:1;position:relative;z-index:1;background:none;border:none;cursor:pointer;padding:12px 0;font-size:13.5px;font-weight:600;font-family:inherit;transition:color .25s ease;}

/* toasts + confetti */
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;font-size:13.5px;color:#fff;box-shadow:0 14px 34px rgba(0,0,0,.5);animation:toastIn .35s var(--ease) both;max-width:280px;}
@keyframes toastIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
.confetti-piece{position:fixed;width:7px;height:9px;border-radius:2px;pointer-events:none;animation:confettiFly .95s ease-out forwards;}
@keyframes confettiFly{to{transform:translate(var(--tx),var(--ty)) rotate(400deg);opacity:0;}}

/* locked overlay */
.locked-wrap{position:relative;}
.locked-blur{filter:blur(7px) saturate(60%);pointer-events:none;user-select:none;}
.lock-cta{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:2;}
.lock-card{max-width:340px;text-align:center;border-radius:var(--r-l);padding:30px 26px;}

/* pricing */
.price-card{border-radius:var(--r-xl);padding:34px 28px;position:relative;}
.price-card.highlight{border-color:rgba(228,161,27,.5);box-shadow:0 0 0 1px rgba(228,161,27,.25) inset,0 24px 60px rgba(0,0,0,.5);}
.price-num{font-family:var(--font-d);font-weight:800;font-size:44px;letter-spacing:-.02em;}
.perk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;font-size:13.8px;color:var(--ink-dim);border-bottom:1px solid var(--line-soft);}
.perk-row:last-child{border-bottom:none;}
.perk-row svg{flex-shrink:0;margin-top:2px;}

.faq-item{border-radius:16px;padding:4px 20px;margin-bottom:10px;}
.faq-item summary{cursor:pointer;padding:16px 0;font-size:14.5px;font-weight:600;color:#fff;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item summary::after{content:"+";font-size:20px;color:var(--v1);transition:transform .3s ease;font-weight:400;}
.faq-item[open] summary::after{transform:rotate(45deg);}
.faq-item p{padding:0 0 18px;font-size:13.8px;line-height:1.65;color:var(--ink-dim);}

.stat-tile{border-radius:16px;padding:22px 18px;text-align:center;}
.progress-track{height:8px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:5px;background:var(--grad);transition:width .5s var(--ease);}

.range-row input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:4px;background:rgba(255,255,255,.1);outline:none;}
.range-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--grad);cursor:pointer;box-shadow:0 0 12px rgba(124,58,237,.5);border:2px solid #fff;}
.range-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--v2);cursor:pointer;border:2px solid #fff;}

.modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(3,2,8,.72);backdrop-filter:blur(6px);z-index:81;}
.modal-card{max-width:380px;width:100%;border-radius:var(--r-l);padding:32px 26px;text-align:center;}

/* ---- agent IA : bulle flottante + panneau ---- */
#agent-root{position:fixed;right:20px;bottom:20px;z-index:75;}
.agent-fab{position:relative;width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 30px rgba(124,58,237,.45);transition:transform .35s var(--ease);}
.agent-fab:hover{transform:scale(1.09) translateY(-2px);}
.agent-fab::before{content:"";position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,var(--v1),var(--gold-1),var(--v2),var(--v1));animation:fabRing 4.5s linear infinite;z-index:-1;opacity:.85;}
.fab-lock{position:absolute;top:-5px;left:-5px;background:var(--grad-gold);color:#1a1206;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:800;display:flex;align-items:center;gap:3px;letter-spacing:.03em;}
.agent-fab::after{content:"";position:absolute;inset:0;border-radius:50%;animation:fabPulse 2.8s ease-out infinite;}
@keyframes fabRing{to{transform:rotate(360deg);}}
@keyframes fabPulse{0%{box-shadow:0 0 0 0 rgba(167,139,250,.45);}70%{box-shadow:0 0 0 20px rgba(167,139,250,0);}100%{box-shadow:0 0 0 0 rgba(167,139,250,0);}}
.fab-icon{position:absolute;display:flex;transition:transform .45s var(--ease),opacity .3s ease;}
.fab-icon.hidden-icon{opacity:0;transform:rotate(-90deg) scale(.4);}
.agent-panel{position:absolute;right:0;bottom:78px;width:min(372px,calc(100vw - 40px));height:min(560px,calc(100vh - 130px));border-radius:24px;overflow:hidden;display:flex;flex-direction:column;background:rgba(10,6,18,.94);border:1px solid rgba(167,139,250,.28);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 44px rgba(124,58,237,.16);transform-origin:bottom right;animation:panelIn .55s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes panelIn{from{opacity:0;transform:scale(.45) translateY(36px);}to{opacity:1;transform:scale(1) translateY(0);}}
.agent-panel.closing{animation:panelOut .25s ease both;}
@keyframes panelOut{to{opacity:0;transform:scale(.6) translateY(24px);}}
.agent-head{position:relative;display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(167,139,250,.18);background:linear-gradient(135deg,rgba(167,139,250,.14),rgba(124,58,237,.08));overflow:hidden;}
.agent-head::before{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.07),transparent);animation:headShimmer 3.8s ease-in-out infinite;}
@keyframes headShimmer{0%,100%{left:-60%;}50%{left:110%;}}
.agent-avatar{position:relative;width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.agent-avatar::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1.5px solid rgba(167,139,250,.5);animation:fabPulse 2.8s ease-out infinite;}
.agent-status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.7);display:inline-block;margin-right:5px;}
.agent-msgs{flex:1;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(167,139,250,.3) transparent;}
.a-msg{max-width:84%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;animation:msgIn .4s var(--ease) both;white-space:pre-line;}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.95);}to{opacity:1;transform:none;}}
.a-msg.bot{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);color:#fff;border-bottom-left-radius:6px;align-self:flex-start;}
.a-msg.user{background:var(--grad);color:#fff;border-bottom-right-radius:6px;align-self:flex-end;}
.typing-dots{display:inline-flex;gap:4px;padding:13px 16px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);border-radius:16px;border-bottom-left-radius:6px;align-self:flex-start;animation:msgIn .3s var(--ease) both;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--v1);animation:dotBounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
.agent-chips{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px 10px;}
.agent-chip{background:rgba(255,255,255,.04);border:1px solid rgba(167,139,250,.3);color:var(--v1);font-size:12px;padding:7px 13px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .25s ease;animation:msgIn .4s var(--ease) both;}
.agent-chip:hover{background:rgba(167,139,250,.14);color:#fff;transform:translateY(-1px);}
.agent-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);}
.agent-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:11px 16px;color:#fff;font-size:13.5px;outline:none;font-family:inherit;transition:border-color .25s ease;}
.agent-input:focus{border-color:rgba(167,139,250,.5);}
.agent-send{width:42px;height:42px;border-radius:50%;background:var(--grad);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s ease,box-shadow .25s ease;}
.agent-send:hover{transform:scale(1.08);box-shadow:0 0 16px rgba(167,139,250,.4);}

/* ---- quiz d'introduction ---- */
.quiz-opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#fff;font-size:14.5px;cursor:pointer;font-family:inherit;transition:border-color .25s ease,background .25s ease,transform .25s ease;}
.quiz-opt:hover:not([disabled]){border-color:rgba(167,139,250,.5);transform:translateY(-1px);}
.quiz-opt.correct{border-color:rgba(74,222,128,.85);background:rgba(74,222,128,.12);box-shadow:0 0 18px rgba(74,222,128,.15);}
.quiz-opt.wrong{border-color:rgba(255,95,95,.8);background:rgba(255,95,95,.1);box-shadow:0 0 18px rgba(255,95,95,.12);}
.quiz-opt[disabled]{cursor:default;}
.quiz-letter{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:var(--v1);flex-shrink:0;}
.quiz-stat{font-family:var(--font-d);font-weight:800;font-size:clamp(2.2rem,6vw,3.2rem);letter-spacing:-.02em;}
.intro-bubble{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);color:#fff;border-radius:18px;border-bottom-left-radius:6px;padding:16px 18px;font-size:14.5px;line-height:1.62;animation:msgIn .5s var(--ease) both;white-space:pre-line;text-align:left;}

@media (max-width:820px){
  .nav-desktop,.nav-actions-desktop{display:none !important;}
}
@media (min-width:821px){
  .nav-burger{display:none !important;}
}

@media (prefers-reduced-motion:reduce){
  .page-enter,.float,.check-pop,.draw-ring,.menu-in,.spin-slow,.spin-slow-rev{animation:none !important;}
  .agent-fab::before,.agent-fab::after,.agent-avatar::after,.agent-head::before{animation:none !important;}
  .agent-panel,.a-msg,.typing-dots,.agent-chip{animation-duration:.01s !important;}
  .mock-card,.mock-chip,.mock-ring,.mock-shine::before{animation:none !important;}
  .hero-up{opacity:1 !important;transform:none !important;animation:none !important;}
  .reveal{opacity:1 !important;transform:none !important;transition:none !important;}
  .feature-card,.btn,.show-card,.tilt{transition:none !important;}
  .scene-inner{transition:none !important;transform:none !important;}
}
</style>

function computeBudget(p){
  const income=Number(p.income)||0, rent=Number(p.rent)||0, charges=Number(p.charges)||0;
  return {income,rent,charges,left:Math.max(0,income-rent-charges)};
}
function generateQuestion(product,profile,goal){
  const {left}=computeBudget(profile);
  const pct = left>0 ? Math.round((product.price/left)*100) : null;
  if(goal && pct) return `Ça représente ${pct} % de ce qu'il te reste ce mois-ci. Ton objectif « ${esc(goal.name)} » avancerait plus lentement. Toujours partant·e ?`;
  if(pct) return `Ça représente ${pct} % de ce qu'il te reste ce mois-ci. Vraiment nécessaire, ou juste une envie du moment ?`;
  return "Est-ce que tu en as vraiment besoin, ou juste envie ?";
}

function toast(msg,icon){
  icon=icon||'sparkles';
  const id='t'+Date.now()+Math.random();
  state.toasts.push({id,msg,icon});
  renderToasts();
  setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);renderToasts();},3400);
}
function renderToasts(){
  document.getElementById('toast-root').innerHTML = state.toasts.map(t=>
    `<div class="toast glass">${I(t.icon,16)}<span>${esc(t.msg)}</span></div>`
  ).join('');
}
function confettiBurst(el){
  if(REDUCED) return;
  const rect = el ? el.getBoundingClientRect() : {left:innerWidth/2,top:innerHeight/2,width:0,height:0};
  const root = document.getElementById('confetti-root');
  for(let i=0;i<30;i++){
    const p=document.createElement('span');
    p.className='confetti-piece';
    const angle=Math.random()*Math.PI*2, dist=70+Math.random()*160;
    p.style.setProperty('--tx',(Math.cos(angle)*dist)+'px');
    p.style.setProperty('--ty',(Math.sin(angle)*dist-50)+'px');
    p.style.left=(rect.left+rect.width/2)+'px';
    p.style.top=(rect.top+rect.height/2)+'px';
    p.style.background = Math.random()>0.45 ? 'var(--v1)' : 'var(--gold-1)';
    p.style.animationDelay=(Math.random()*0.12)+'s';
    root.appendChild(p);
    setTimeout(()=>p.remove(),1300);
  }
}

          if(quiz.revealed){ if(i===q.answer) cls='correct'; else if(i===quiz.picked) cls='wrong'; }
          return `<button class="quiz-opt ${cls}" ${quiz.revealed?'disabled':''} onclick="quizPick(${i})">

}
function quizPick(i){
  if(quiz.revealed) return;
  quiz.picked=i; quiz.revealed=true;
  if(i===QUIZ[quiz.i].answer) quiz.score++;
  render();
}
function quizNext(){
  if(quiz.i<QUIZ.length-1){ quiz.i++; quiz.picked=null; quiz.revealed=false; render(true); }
  else { quiz.finished=true; render(true); }
}
function introFinish(mode){
  state.introDone=true; saveLocal();

function restartQuiz(){
  quiz.i=0; quiz.picked=null; quiz.revealed=false; quiz.score=0; quiz.finished=false;

}

  if(r && r.url){ window.location.href = r.url; return; }

  confettiBurst(btn);
  toast('Bienvenue dans Premium ✨'+(r&&r.demo?' (mode démo)':''),'crown');
  renderAgent();
  nav('dashboard');
}

function switchAuthMode(m){ state.auth.mode=m; state.auth.errors={}; render(); }
function toggleShowPass(){ state.auth.showPass=!state.auth.showPass; render(); }
function submitAuth(){
  const a=state.auth;
  const nom = a.mode==='inscription' ? (document.getElementById('f-nom')?.value||'') : '';
  const email = document.getElementById('f-email').value;
  const pass = document.getElementById('f-pass').value;
  a.nom=nom; a.email=email; a.pass=pass;
  const errors={};
  if(a.mode==='inscription' && nom.trim().length<2) errors.nom='Trop court.';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) errors.email='E-mail invalide.';
  if(pass.length<6) errors.pass='6 caractères minimum.';
  a.errors=errors;
  if(Object.keys(errors).length===0){ a.done=true; saveLocal(); }
  render();
}

        </div>` : ''}
        ${o.step===1 ? FieldHtml('ob-income','Revenu mensuel (€)','number',o.income,null,'wallet') : ''}
        ${o.step===2 ? FieldHtml('ob-rent','Loyer (€)','number',o.rent,null,'home') + FieldHtml('ob-charges','Charges fixes et abonnements (€)','number',o.charges,null,'creditCard') : ''}
        ${o.step===3 ? `<p style="font-size:13px;color:var(--ink-dim);margin:0 0 16px;line-height:1.6;">Pour quoi économises-tu ? Chaque achat auquel tu résisteras fera avancer cet objectif.</p>`
          + FieldHtml('ob-goal-name','Ton objectif (ex : Voyage, Permis…)','text',o.goalName,null,'target')
          + FieldHtml('ob-goal-target','Montant à atteindre (€)','number',o.goalTarget,null,'coins') : ''}
      </div>
      <div class="reveal" style="display:flex;gap:10px;">
        ${o.step>0?`<button onclick="onboardBack()" class="btn btn-ghost">${I('chevronLeft',16)} Retour</button>`:''}
        <button onclick="onboardNext()" class="btn btn-neon" style="flex:1;">${o.step<3?'Continuer':'Créer mon dashboard'} ${I('chevronRight',16)}</button>
      </div>
      <p class="reveal" style="font-size:11.5px;color:var(--ink-faint);text-align:center;margin:16px 0 0;">Stocké sur ton appareil uniquement. Aucune connexion bancaire.</p>
    </div>
  </section>`;
}
function selectStatus(s){ state.onboarding.status=s; render(); }
function onboardBack(){ if(state.onboarding.step>0){ state.onboarding.step--; render(); } }
function onboardNext(){
  const o=state.onboarding;
  if(o.step===1){
    o.income=document.getElementById('ob-income').value;
    if(!(Number(o.income)>0)){ toast('Indique ton revenu mensuel pour continuer.','wallet'); return; }
  }
  if(o.step===2){
    o.rent=document.getElementById('ob-rent').value;
    o.charges=document.getElementById('ob-charges').value;
    if(o.rent==='' || o.charges===''){ toast('Indique ton loyer et tes charges (0 si aucun).','home'); return; }
  }
  if(o.step===3){
    o.goalName=document.getElementById('ob-goal-name').value.trim();
    o.goalTarget=document.getElementById('ob-goal-target').value;
    if(!o.goalName || !(Number(o.goalTarget)>0)){ toast('Donne un nom et un montant à ton objectif.','target'); return; }
  }
  if(o.step<3){ o.step++; render(); return; }
  state.profile = {
    status:o.status, nom:state.auth.nom,
    income:Number(o.income), rent:Number(o.rent)||0, charges:Number(o.charges)||0,
  };
  state.goals = [{id:1, name:o.goalName, target:Number(o.goalTarget), current:0}];
  state.streak = 1;
  state.savedTotal = 0;
  state.sous = 20; // bonus de bienvenue
  state.week = WEEK_DAYS.map(d=>({day:d,amount:0}));
  state.victories = [];
  saveLocal();
  toast('Profil créé — 20 sous de bienvenue !','coins');
  nav('dashboard');
}

/* ============================== REVEAL / TILT / COUNTUP ============================== */
let revealObs;
function initReveal(){
  if(revealObs) revealObs.disconnect();
  if(REDUCED) return;
  revealObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('visible');
        if(e.target.dataset.countup!==undefined) runCountUp(e.target);
        revealObs.unobserve(e.target);
      }
    });
  },{threshold:.14});
  document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));
  document.querySelectorAll('[data-countup]').forEach(el=>{ if(!el.closest('.reveal')) revealObs.observe(el); });
}
function runCountUp(el){
  const end = parseFloat(el.dataset.countup);
  const suffix = el.dataset.suffix||'';
  const dec = parseInt(el.dataset.dec||'0',10);
  const t0 = performance.now(), dur=1300;
  function tick(t){
    const p = Math.min(1,(t-t0)/dur);
    const v = end*(1-Math.pow(1-p,3));
    el.textContent = v.toFixed(dec).replace('.',',')+suffix;
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function initTilt(root){
  if(REDUCED) return;
  root.querySelectorAll('.tilt').forEach(card=>{
    card.addEventListener('pointermove',e=>{
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
      const rx=(py-0.5)*-9, ry=(px-0.5)*9;
      card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`;
    });
    card.addEventListener('pointerleave',()=>{ card.style.transform=''; });
  });
}


/* ============================== AMBIENT PARTICLE FIELD ============================== */
(function initParticles(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w,h,particles=[];
  function resize(){
    w = canvas.width = innerWidth * Math.min(devicePixelRatio||1,1.5);
    h = canvas.height = innerHeight * Math.min(devicePixelRatio||1,1.5);
    canvas.style.width = innerWidth+'px';
    canvas.style.height = innerHeight+'px';
  }
  function seed(){
    particles = Array.from({length:32},()=>({
      x:Math.random()*w, y:Math.random()*h,
      r:(Math.random()*1.6+0.4)*Math.min(devicePixelRatio||1,1.5),
      vx:(Math.random()-0.5)*0.12, vy:(Math.random()-0.5)*0.12,
      hue: Math.random()>0.78 ? 'gold' : 'violet',
      a: Math.random()*0.5+0.15,
    }));
  }
  resize(); seed();
  window.addEventListener('resize', ()=>{ resize(); });
  function draw(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      if(!REDUCED){ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0; }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.hue==='gold' ? `rgba(251,205,107,${p.a})` : `rgba(167,139,250,${p.a})`;
      ctx.fill();
    });
    if(!REDUCED) requestAnimationFrame(draw);
  }
  draw();
})();

/* Worthy : 3 questions offertes par jour en Gratuit, illimité en Premium */
const AGENT_FREE_LIMIT = 3;
const agent = {open:false, messages:[], typing:false, greeted:false, freeUsed:0};
const NO_PROFILE_CTX = {status:null, income:0, rent:0, charges:0, nom:''};
function agentLimitReached(){ return !state.isPremium && agent.freeUsed>=AGENT_FREE_LIMIT; }

/*
 * POINT DE BRANCHEMENT API :
 * en production, remplace agentBrain() par un appel fetch() vers TON backend,
 * qui lui-même appelle l'API du LLM (OpenAI, Claude...) avec ta clé secrète.
 * La clé ne doit JAMAIS être dans ce fichier front.
 */
function agentBrain(raw){
  const t = raw.toLowerCase();
  const p = state.profile || NO_PROFILE_CTX;
  const b = computeBudget(p);
  const name = (p.nom||'').trim();
  const m = raw.match(/(\d+[.,]?\d*)\s*€?/);
  if(m && parseFloat(m[1].replace(',','.'))>0){
    const price = parseFloat(m[1].replace(',','.'));
    const pct = b.left>0 ? Math.round(price/b.left*100) : null;
    const goal = state.goals[0];
    if(pct===null) return "Ton budget du mois est déjà à zéro… c'est peut-être le signal le plus clair qu'on puisse avoir, non ?";
    if(pct>=50) return `${price} €, c'est ${pct} % de ce qu'il te reste ce mois-ci (${b.left} €). Presque la moitié de ta marge.\n\nMa suggestion : on pose une pause de 24 h. Si demain tu y penses encore, on en reparle.`;
    if(pct>=20) return `Ça représente ${pct} % de ton reste-à-vivre (${b.left} €). Ton objectif « ${goal.name} » avancerait plus lentement.\n\nQuestion honnête : besoin réel, ou envie du moment ?`;
    return `${price} €, soit ${pct} % de ce qu'il te reste. C'est raisonnable — mais est-ce que tu l'aurais acheté la semaine dernière ? Si la réponse est non, c'est peut-être l'algorithme qui a gagné, pas toi.`;
  }
  if(/budget|reste|argent|combien/.test(t)) return `Ce mois-ci il te reste ${b.left} € une fois le loyer (${b.rent} €) et les charges (${b.charges} €) déduits de tes ${b.income} €.\n\nEt tu as déjà gardé ${state.savedTotal} € en résistant. Pas mal, non ?`;
  if(/motiv|encourag|craquer|envie|dur/.test(t)) return `${name?name+', t':'T'}a série tient depuis ${state.streak} jours. 🔥\n\nChaque euro non dépensé va vers « ${state.goals[0].name} » — il en manque ${state.goals[0].target-state.goals[0].current} €. Le sneaker de trop ne te rapprochera de rien du tout.`;
  if(/objectif|japon|voyage|épargne|epargne/.test(t)) return state.goals.map(g=>`« ${g.name} » : ${g.current} / ${g.target} € (${Math.round(g.current/g.target*100)} %)`).join('\n') + '\n\nChaque refus fait avancer ces barres. Tu veux simuler un achat pour voir son impact ?';
  if(/bonjour|salut|hello|coucou|hey/.test(t)) return `Salut${name?' '+name:''} ! Une envie d'achat te trotte dans la tête ? Dis-moi quoi et à quel prix, on regarde ensemble ce que ça pèse vraiment.`;
  if(/merci|top|cool|nickel/.test(t)) return "Avec plaisir. Je suis là au moment du doute — c'est exactement mon travail. 💜";
  return "Dis-m'en plus : c'est quoi, et ça coûte combien ? Donne-moi un prix et je te montre ce que ça représente sur ton mois.";
}

  const p = state.profile || NO_PROFILE_CTX;

async function sendAgentMessage(text){
  text = (text||'').trim();
  if(!text || agent.typing || agentLimitReached()) return;
  const history = agent.messages.slice(-10);
  agent.messages.push({who:'user',text});
  if(!state.isPremium){ agent.freeUsed++; saveLocal(); }
  agent.typing = true;
  renderAgent();
  const minDelay = new Promise(r=>setTimeout(r, REDUCED ? 60 : 850 + Math.random()*500));
  const req = api('/api/chat',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({cid:CID, message:text, history, context:agentContext()}),
  });
  const [,r] = await Promise.all([minDelay, req]);
  agent.typing = false;
  agent.messages.push({who:'bot', text:(r && r.reply) ? r.reply : agentBrain(text)});
  if(agentLimitReached()) agent.messages.push({who:'bot',text:`Tes ${AGENT_FREE_LIMIT} questions gratuites du jour sont épuisées. ✨\n\nAvec Premium (2,99 €/mois), je suis là sans limite — et je connais ton profil par cœur.`});
  renderAgent();
}

function renderAgent(){
  const root = document.getElementById('agent-root');
  const limited = agentLimitReached();
  const remaining = state.isPremium ? null : Math.max(0, AGENT_FREE_LIMIT - agent.freeUsed);
  const chips = ["J'ai envie de craquer 😅","Où en est mon budget ?","Motive-moi"];
  const showChips = !limited && agent.open && !agent.typing && agent.messages.filter(m=>m.who==='user').length===0;
  const statusLine = state.isPremium
    ? 'En ligne — jamais du côté du vendeur'
    : (limited ? 'Questions gratuites du jour épuisées' : `Gratuit — ${remaining} question${remaining>1?'s':''} offerte${remaining>1?'s':''} aujourd'hui`);
  root.innerHTML = `
    ${agent.open ? `<div class="agent-panel" id="agent-panel" role="dialog" aria-label="Assistant Worthy">
      <div class="agent-head">
        <div class="agent-avatar">${I('brain',19)}</div>
        <div style="flex:1;min-width:0;">
          <p style="font-size:14.5px;font-weight:700;color:#fff;margin:0;display:flex;align-items:center;gap:7px;">Worthy ${state.isPremium?`<span class="badge-premium">${I('crown',9)} Premium</span>`:''}</p>
          <p style="font-size:11px;color:var(--ink-dim);margin:2px 0 0;"><span class="agent-status-dot"></span>${statusLine}</p>
        </div>
        <button onclick="toggleAgent()" aria-label="Fermer" style="background:none;border:none;cursor:pointer;color:var(--ink-dim);padding:6px;display:flex;">${I('x',17)}</button>
      </div>
      <div class="agent-msgs" id="agent-msgs">
        ${agent.messages.map(m=>`<div class="a-msg ${m.who}">${esc(m.text)}</div>`).join('')}
        ${agent.typing?`<div class="typing-dots"><span></span><span></span><span></span></div>`:''}
      </div>
      ${showChips?`<div class="agent-chips">${chips.map((c,i)=>`<button class="agent-chip" style="animation-delay:${.15+i*.08}s" onclick="agentQuick('${c.replace(/'/g,"\\'")}')">${esc(c)}</button>`).join('')}</div>`:''}
      ${limited
        ? `<div style="padding:12px;border-top:1px solid var(--line);"><button onclick="toggleAgent();nav('tarifs')" class="btn btn-gold btn-block btn-sm">${I('crown',14)} Débloquer Worthy en illimité — 2,99 €/mois</button></div>`
        : `<div class="agent-input-row">
            <input id="agent-input" class="agent-input" placeholder="Ex : une veste à 89 €…" onkeydown="agentKeydown(event)" ${agent.typing?'disabled':''}/>
            <button class="agent-send" onclick="sendAgentFromInput()" aria-label="Envoyer">${I('arrowRight',17)}</button>
          </div>`}
    </div>`:''}
    <button class="agent-fab" onclick="toggleAgent()" aria-label="${agent.open?'Fermer l’assistant':'Ouvrir l’assistant Worthy'}" aria-expanded="${agent.open}">
      <span class="fab-icon ${agent.open?'hidden-icon':''}">${I('brain',24,1.6)}</span>
      <span class="fab-icon ${agent.open?'':'hidden-icon'}">${I('x',22,1.9)}</span>
      ${limited?`<span class="fab-lock">${I('crown',9)} PRO</span>`:''}
    </button>`;
  const msgs = document.getElementById('agent-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
  const input = document.getElementById('agent-input');
  if(input && agent.open && !agent.typing && agent.messages.length>1) input.focus();
}

/* ============================== INIT ============================== */
loadLocal();
state.page = state.introDone ? 'accueil' : 'intro';
render(false);
renderAgent();

/* Synchronisation avec le backend (statut premium + retour de Stripe Checkout) */
(async function initServerSync(){
  const me = await api('/api/me?cid='+encodeURIComponent(CID));
  if(me && me.premium && !state.isPremium){ state.isPremium=true; render(false); }
  let params;
  try{ params = new URLSearchParams(location.search); }catch(e){ return; }
  if(params.get('checkout')==='success' && params.get('session_id')){
    const v = await api('/api/verify-session?session_id='+encodeURIComponent(params.get('session_id')));
    if(v && v.premium){
      state.isPremium=true;
      confettiBurst(null);
      toast('Paiement confirmé — bienvenue dans Premium ✨','crown');
      nav('dashboard');
    }
    try{ history.replaceState({},'',location.pathname); }catch(e){}
  } else if(params.get('checkout')==='cancel'){
    toast('Paiement annulé — tu restes en Gratuit.','shield');
    try{ history.replaceState({},'',location.pathname); }catch(e){}
  }
})();
</script>
