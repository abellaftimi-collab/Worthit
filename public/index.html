:root{
  --void:#050308;
  --deep:#08050f;
  --ink:#f6f3fb;
  --ink-dim:rgba(246,243,251,.58);
  --ink-faint:rgba(246,243,251,.36);
  --line:rgba(255,255,255,.09);
  --line-soft:rgba(255,255,255,.06);
  --glass:rgba(255,255,255,.03);
  --glass-hi:rgba(255,255,255,.06);
  --v1:#a78bfa;
  --v2:#7c3aed;
  --v3:#2e1065;
  --gold-1:#fbcd6b;
  --gold-2:#e4a11b;
  --accent-1:var(--v1);
  --accent-2:var(--v2);
  --grad:linear-gradient(135deg,var(--accent-1) 0%,var(--accent-2) 100%);
  --grad-gold:linear-gradient(135deg,var(--gold-1) 0%,var(--gold-2) 100%);
  --r-s:10px;--r-m:16px;--r-l:22px;--r-xl:28px;--pill:999px;
  --ease:cubic-bezier(.22,1,.36,1);
  --font-d:'Unbounded',ui-sans-serif,system-ui,sans-serif;
  --font-b:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--void);}
body{font-family:var(--font-b);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
h1,h2,h3{font-family:var(--font-d);text-wrap:balance;margin:0;}
p{margin:0;}
button,input{font-family:inherit;}
::selection{background:rgba(167,139,250,.3);color:#fff;}
a{color:inherit;}
.tabular{font-variant-numeric:tabular-nums;}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;}
#modal-root{position:relative;z-index:80;}
#toast-root{position:fixed;right:18px;bottom:96px;z-index:90;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
#confetti-root{position:fixed;inset:0;z-index:95;pointer-events:none;overflow:hidden;}

.glass{background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.container{max-width:1120px;margin:0 auto;padding:0 24px;}
.section{padding:150px 24px 100px;position:relative;}
.section-tight{padding:90px 24px 90px;}
.eyebrow{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--v1);margin:0 0 14px;font-weight:600;}
.h2{font-size:clamp(2rem,4.5vw,2.9rem);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.12;}
.lede{font-size:15.5px;line-height:1.65;color:var(--ink-dim);}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.gold-text{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
.center{text-align:center;margin-left:auto;margin-right:auto;}

@keyframes pageIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.page-enter{animation:pageIn .5s var(--ease) both;}

@keyframes spinSlow{to{transform:rotate(360deg);}}
.spin-slow{animation:spinSlow 34s linear infinite;transform-origin:center;}
@keyframes spinSlowRev{to{transform:rotate(-360deg);}}
.spin-slow-rev{animation:spinSlowRev 46s linear infinite;transform-origin:center;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.float{animation:floatY 6s ease-in-out infinite;}

.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ---- 3D hero scene ---- */
/* ---- hero produit : mockup de la pause Worthit ---- */
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;}
.hero-up{opacity:0;transform:translateY(22px);animation:heroUp .7s var(--ease) both;}
@keyframes heroUp{to{opacity:1;transform:translateY(0);}}
.mock-wrap{position:relative;display:flex;justify-content:center;padding:30px 0;}
.mock-glow{position:absolute;width:460px;height:460px;left:50%;top:50%;translate:-50% -50%;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.22) 0%,transparent 65%);pointer-events:none;}
.mock-ring{position:absolute;left:50%;top:50%;translate:-50% -50%;width:520px;height:520px;border:1px dashed rgba(167,139,250,.15);border-radius:50%;animation:spinSlow 70s linear infinite;pointer-events:none;}
.mock-card{position:relative;width:min(372px,100%);background:linear-gradient(165deg,rgba(26,16,44,.97),rgba(12,7,22,.97));border:1px solid rgba(167,139,250,.26);border-radius:24px;padding:22px;box-shadow:0 40px 90px rgba(0,0,0,.55),0 0 50px rgba(124,58,237,.12);animation:mockFloat 7s ease-in-out infinite;}
@keyframes mockFloat{0%,100%{transform:translateY(0) rotate(-.5deg);}50%{transform:translateY(-9px) rotate(.5deg);}}
.mock-shine{position:absolute;inset:0;border-radius:24px;overflow:hidden;pointer-events:none;}
.mock-shine::before{content:"";position:absolute;top:0;bottom:0;left:-70%;width:45%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.045),transparent);animation:mockShine 6s ease-in-out infinite;}
@keyframes mockShine{0%,55%,100%{left:-70%;}28%{left:120%;}}
.mock-chip{position:absolute;display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:999px;background:rgba(14,9,26,.94);border:1px solid rgba(167,139,250,.3);font-size:12px;font-weight:600;color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.45);white-space:nowrap;z-index:2;}
.mock-chip.c1{top:6px;right:-6px;animation:chipFloat 6s ease-in-out infinite;}
.mock-chip.c2{bottom:6px;left:-10px;animation:chipFloat 6s ease-in-out 1.8s infinite;}
@keyframes chipFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@media (max-width:920px){
  .hero-grid{grid-template-columns:1fr;gap:40px;}
  .hero-l{text-align:center;}
  .hero-cta,.hero-trust{justify-content:center;}
  .mock-ring{width:440px;height:440px;}
}
@media (max-width:480px){.mock-chip.c1{right:0;}.mock-chip.c2{left:0;}}

.tilt{transition:transform .35s var(--ease),box-shadow .35s ease,border-color .35s ease;transform-style:preserve-3d;will-change:transform;}

.feature-card{position:relative;overflow:hidden;}
.feature-card::before{content:"";position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.8),transparent);opacity:0;transition:opacity .35s ease;}
.feature-card:hover{border-color:rgba(167,139,250,.4);box-shadow:0 0 30px rgba(124,58,237,.14),0 20px 46px rgba(0,0,0,.5);}
.feature-card:hover::before{opacity:1;}
.feature-card.locked{opacity:.68;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-weight:700;border-radius:var(--pill);transition:box-shadow .3s ease,transform .3s ease,filter .3s ease;font-size:14.5px;padding:13px 26px;}
.btn-neon{background:var(--grad);color:#fff;}
.btn-neon:hover{box-shadow:0 0 26px rgba(167,139,250,.42),0 0 60px rgba(124,58,237,.22);transform:translateY(-2px);filter:brightness(1.05);}
.btn-gold{background:var(--grad-gold);color:#1a1206;}
.btn-gold:hover{box-shadow:0 0 26px rgba(251,205,107,.45),0 0 60px rgba(228,161,27,.25);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.16);}
.btn-ghost:hover{border-color:rgba(167,139,250,.55);box-shadow:0 0 20px rgba(167,139,250,.16);transform:translateY(-2px);}
.btn-sm{padding:9px 18px;font-size:13px;}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.btn-block{width:100%;}

.nav-link{position:relative;transition:color .25s ease;background:none;border:none;cursor:pointer;font-size:14px;font-family:inherit;}
.nav-link::after{content:"";position:absolute;left:0;bottom:-6px;height:1px;width:0;background:var(--grad);transition:width .3s ease;}
.nav-link:hover::after,.nav-link.active::after{width:100%;}

.pill{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--pill);font-size:12.5px;}
.badge-premium{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:var(--pill);font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;background:var(--grad-gold);color:#1a1206;}

.filter-pill{transition:all .3s ease;cursor:pointer;border:1px solid var(--line);background:var(--glass);color:var(--ink-dim);font-size:13.5px;padding:9px 20px;border-radius:var(--pill);font-family:inherit;}
.filter-pill.active{background:linear-gradient(135deg,rgba(167,139,250,.18),rgba(124,58,237,.18));border-color:rgba(167,139,250,.55);color:#fff;box-shadow:0 0 16px rgba(124,58,237,.14);}

.show-card{overflow:hidden;border-radius:20px;}
.field{position:relative;margin-bottom:16px;}
.field input{width:100%;background:rgba(255,255,255,.03);color:#fff;border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:22px 44px 10px 16px;font-size:15px;outline:none;transition:border-color .3s ease,box-shadow .3s ease;font-family:inherit;}
.field input.no-icon{padding-right:16px;}
.field input:focus{border-color:rgba(167,139,250,.6);box-shadow:0 0 16px rgba(124,58,237,.14);}
.field input.error{border-color:rgba(255,100,100,.7);}
.field label{position:absolute;left:16px;top:18px;font-size:15px;color:var(--ink-faint);pointer-events:none;transition:all .2s ease;}
.field input:focus + label,.field input:not(:placeholder-shown) + label{top:8px;font-size:11px;color:var(--v1);letter-spacing:.06em;text-transform:uppercase;}
.field .field-icon{position:absolute;right:14px;top:20px;color:rgba(255,255,255,.35);}
.field .field-toggle{position:absolute;right:12px;top:16px;background:none;border:none;cursor:pointer;padding:4px;display:flex;color:rgba(255,255,255,.4);}
.field-error{font-size:12px;color:#ff8a8a;margin:6px 2px 0;}

@keyframes checkPop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;}}
.check-pop{animation:checkPop .6s var(--ease) both;}
@keyframes drawRing{from{stroke-dashoffset:220;}to{stroke-dashoffset:0;}}
.draw-ring{stroke-dasharray:220;animation:drawRing .9s ease-out .1s both;}

.burger-line{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:transform .3s ease,opacity .3s ease;}
@keyframes menuIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.menu-in{animation:menuIn .3s ease both;}

.tab-btn{flex:1;position:relative;z-index:1;background:none;border:none;cursor:pointer;padding:12px 0;font-size:13.5px;font-weight:600;font-family:inherit;transition:color .25s ease;}

/* toasts + confetti */
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;font-size:13.5px;color:#fff;box-shadow:0 14px 34px rgba(0,0,0,.5);animation:toastIn .35s var(--ease) both;max-width:280px;}
@keyframes toastIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
.confetti-piece{position:fixed;width:7px;height:9px;border-radius:2px;pointer-events:none;animation:confettiFly .95s ease-out forwards;}
@keyframes confettiFly{to{transform:translate(var(--tx),var(--ty)) rotate(400deg);opacity:0;}}

/* locked overlay */
.locked-wrap{position:relative;}
.locked-blur{filter:blur(7px) saturate(60%);pointer-events:none;user-select:none;}
.lock-cta{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:2;}
.lock-card{max-width:340px;text-align:center;border-radius:var(--r-l);padding:30px 26px;}

/* pricing */
.price-card{border-radius:var(--r-xl);padding:34px 28px;position:relative;}
.price-card.highlight{border-color:rgba(228,161,27,.5);box-shadow:0 0 0 1px rgba(228,161,27,.25) inset,0 24px 60px rgba(0,0,0,.5);}
.price-num{font-family:var(--font-d);font-weight:800;font-size:44px;letter-spacing:-.02em;}
.perk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;font-size:13.8px;color:var(--ink-dim);border-bottom:1px solid var(--line-soft);}
.perk-row:last-child{border-bottom:none;}
.perk-row svg{flex-shrink:0;margin-top:2px;}

.faq-item{border-radius:16px;padding:4px 20px;margin-bottom:10px;}
.faq-item summary{cursor:pointer;padding:16px 0;font-size:14.5px;font-weight:600;color:#fff;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item summary::after{content:"+";font-size:20px;color:var(--v1);transition:transform .3s ease;font-weight:400;}
.faq-item[open] summary::after{transform:rotate(45deg);}
.faq-item p{padding:0 0 18px;font-size:13.8px;line-height:1.65;color:var(--ink-dim);}

.stat-tile{border-radius:16px;padding:22px 18px;text-align:center;}
.progress-track{height:8px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:5px;background:var(--grad);transition:width .5s var(--ease);}

.range-row input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:4px;background:rgba(255,255,255,.1);outline:none;}
.range-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--grad);cursor:pointer;box-shadow:0 0 12px rgba(124,58,237,.5);border:2px solid #fff;}
.range-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--v2);cursor:pointer;border:2px solid #fff;}

.modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(3,2,8,.72);backdrop-filter:blur(6px);z-index:81;}
.modal-card{max-width:380px;width:100%;border-radius:var(--r-l);padding:32px 26px;text-align:center;}

/* ---- agent IA : bulle flottante + panneau ---- */
#agent-root{position:fixed;right:20px;bottom:20px;z-index:75;}
.agent-fab{position:relative;width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 30px rgba(124,58,237,.45);transition:transform .35s var(--ease);}
.agent-fab:hover{transform:scale(1.09) translateY(-2px);}
.agent-fab::before{content:"";position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,var(--v1),var(--gold-1),var(--v2),var(--v1));animation:fabRing 4.5s linear infinite;z-index:-1;opacity:.85;}
.fab-lock{position:absolute;top:-5px;left:-5px;background:var(--grad-gold);color:#1a1206;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:800;display:flex;align-items:center;gap:3px;letter-spacing:.03em;}
.agent-fab::after{content:"";position:absolute;inset:0;border-radius:50%;animation:fabPulse 2.8s ease-out infinite;}
@keyframes fabRing{to{transform:rotate(360deg);}}
@keyframes fabPulse{0%{box-shadow:0 0 0 0 rgba(167,139,250,.45);}70%{box-shadow:0 0 0 20px rgba(167,139,250,0);}100%{box-shadow:0 0 0 0 rgba(167,139,250,0);}}
.fab-icon{position:absolute;display:flex;transition:transform .45s var(--ease),opacity .3s ease;}
.fab-icon.hidden-icon{opacity:0;transform:rotate(-90deg) scale(.4);}
.agent-panel{position:absolute;right:0;bottom:78px;width:min(372px,calc(100vw - 40px));height:min(560px,calc(100vh - 130px));border-radius:24px;overflow:hidden;display:flex;flex-direction:column;background:rgba(10,6,18,.94);border:1px solid rgba(167,139,250,.28);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 44px rgba(124,58,237,.16);transform-origin:bottom right;animation:panelIn .55s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes panelIn{from{opacity:0;transform:scale(.45) translateY(36px);}to{opacity:1;transform:scale(1) translateY(0);}}
.agent-panel.closing{animation:panelOut .25s ease both;}
@keyframes panelOut{to{opacity:0;transform:scale(.6) translateY(24px);}}
.agent-head{position:relative;display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(167,139,250,.18);background:linear-gradient(135deg,rgba(167,139,250,.14),rgba(124,58,237,.08));overflow:hidden;}
.agent-head::before{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.07),transparent);animation:headShimmer 3.8s ease-in-out infinite;}
@keyframes headShimmer{0%,100%{left:-60%;}50%{left:110%;}}
.agent-avatar{position:relative;width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.agent-avatar::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1.5px solid rgba(167,139,250,.5);animation:fabPulse 2.8s ease-out infinite;}
.agent-status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.7);display:inline-block;margin-right:5px;}
.agent-msgs{flex:1;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(167,139,250,.3) transparent;}
.a-msg{max-width:84%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;animation:msgIn .4s var(--ease) both;white-space:pre-line;}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.95);}to{opacity:1;transform:none;}}
.a-msg.bot{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);color:#fff;border-bottom-left-radius:6px;align-self:flex-start;}
.a-msg.user{background:var(--grad);color:#fff;border-bottom-right-radius:6px;align-self:flex-end;}
.typing-dots{display:inline-flex;gap:4px;padding:13px 16px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);border-radius:16px;border-bottom-left-radius:6px;align-self:flex-start;animation:msgIn .3s var(--ease) both;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--v1);animation:dotBounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
.agent-chips{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px 10px;}
.agent-chip{background:rgba(255,255,255,.04);border:1px solid rgba(167,139,250,.3);color:var(--v1);font-size:12px;padding:7px 13px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .25s ease;animation:msgIn .4s var(--ease) both;}
.agent-chip:hover{background:rgba(167,139,250,.14);color:#fff;transform:translateY(-1px);}
.agent-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);}
.agent-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:11px 16px;color:#fff;font-size:13.5px;outline:none;font-family:inherit;transition:border-color .25s ease;}
.agent-input:focus{border-color:rgba(167,139,250,.5);}
.agent-send{width:42px;height:42px;border-radius:50%;background:var(--grad);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s ease,box-shadow .25s ease;}
.agent-send:hover{transform:scale(1.08);box-shadow:0 0 16px rgba(167,139,250,.4);}

/* ---- simulateur : champs libres ---- */
.sim-num{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:9px;color:#fff;font-size:13px;font-weight:700;padding:6px 10px;width:72px;text-align:right;outline:none;font-family:inherit;transition:border-color .25s ease;}
.sim-num:focus{border-color:rgba(167,139,250,.55);}
.sim-num::-webkit-outer-spin-button,.sim-num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* ---- modal fonctionnalité ---- */
.feature-modal{position:relative;max-width:530px;width:100%;border-radius:24px;padding:34px 30px;animation:featZoom .5s cubic-bezier(.34,1.56,.64,1) both;max-height:88vh;overflow-y:auto;}
@keyframes featZoom{from{opacity:0;transform:scale(.55) translateY(40px);}to{opacity:1;transform:scale(1) translateY(0);}}
@media (prefers-reduced-motion:reduce){.feature-modal{animation:none !important;}}
.feature-card{cursor:pointer;}

/* ---- sélecteur de langue ---- */
.lang-wrap{position:relative;}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;transition:border-color .25s ease,box-shadow .25s ease;}
.lang-btn:hover{border-color:rgba(167,139,250,.5);box-shadow:0 0 14px rgba(124,58,237,.15);}
.lang-btn .chev{display:flex;transition:transform .35s var(--ease);}
.lang-btn.open .chev{transform:rotate(180deg);}
.lang-menu{position:absolute;top:calc(100% + 10px);right:0;min-width:176px;background:rgba(12,7,22,.97);border:1px solid rgba(167,139,250,.28);border-radius:14px;padding:6px;z-index:60;transform-origin:top right;animation:langIn .35s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 30px rgba(124,58,237,.12);}
@keyframes langIn{from{opacity:0;transform:scale(.8) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.lang-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.85);font-size:13px;font-family:inherit;text-align:left;animation:msgIn .35s var(--ease) both;transition:background .2s ease,transform .2s ease;}
.lang-item:hover{background:rgba(167,139,250,.12);transform:translateX(2px);}
.lang-item.active{color:var(--v1);font-weight:700;}
.lang-item .flag{font-size:16px;line-height:1;}
@media (prefers-reduced-motion:reduce){.lang-menu,.lang-item{animation:none !important;}}

/* ---- quiz d'introduction ---- */
.quiz-opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#fff;font-size:14.5px;cursor:pointer;font-family:inherit;transition:border-color .25s ease,background .25s ease,transform .25s ease;}
.quiz-opt:hover:not([disabled]){border-color:rgba(167,139,250,.5);transform:translateY(-1px);}
.quiz-opt.correct{border-color:rgba(74,222,128,.85);background:rgba(74,222,128,.12);box-shadow:0 0 18px rgba(74,222,128,.15);}
.quiz-opt.wrong{border-color:rgba(255,95,95,.8);background:rgba(255,95,95,.1);box-shadow:0 0 18px rgba(255,95,95,.12);}
.quiz-opt[disabled]{cursor:default;}
.quiz-letter{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:var(--v1);flex-shrink:0;}
.quiz-stat{font-family:var(--font-d);font-weight:800;font-size:clamp(2.2rem,6vw,3.2rem);letter-spacing:-.02em;}
.intro-bubble{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.22);color:#fff;border-radius:18px;border-bottom-left-radius:6px;padding:16px 18px;font-size:14.5px;line-height:1.62;animation:msgIn .5s var(--ease) both;white-space:pre-line;text-align:left;}

@media (max-width:820px){
  .nav-desktop,.nav-actions-desktop{display:none !important;}
}
@media (min-width:821px){
  .nav-burger{display:none !important;}
}

@media (prefers-reduced-motion:reduce){
  .page-enter,.float,.check-pop,.draw-ring,.menu-in,.spin-slow,.spin-slow-rev{animation:none !important;}
  .agent-fab::before,.agent-fab::after,.agent-avatar::after,.agent-head::before{animation:none !important;}
  .agent-panel,.a-msg,.typing-dots,.agent-chip{animation-duration:.01s !important;}
  .mock-card,.mock-chip,.mock-ring,.mock-shine::before{animation:none !important;}
  .hero-up{opacity:1 !important;transform:none !important;animation:none !important;}
  .reveal{opacity:1 !important;transform:none !important;transition:none !important;}
  .feature-card,.btn,.show-card,.tilt{transition:none !important;}
  .scene-inner{transition:none !important;transform:none !important;}
}
</style>

async function authedApi(path, opts){

function translateAuthError(msg){
  msg = String(msg||'');
  if(/already registered|already exists/i.test(msg)) return "Un compte existe déjà avec cet e-mail.";
  if(/invalid login credentials/i.test(msg)) return "E-mail ou mot de passe incorrect.";
  if(/password should be at least/i.test(msg)) return "6 caractères minimum.";
  if(/rate limit/i.test(msg)) return "Trop de tentatives — réessaie dans un instant.";
  if(/email not confirmed/i.test(msg)) return "Confirme d'abord ton e-mail (lien envoyé à l'inscription).";
  return "Une erreur est survenue. Réessaie.";
}
/* Charge le profil/objectifs/victoires depuis le serveur pour l'utilisateur connecté */
async function syncFromServer(){
  const r = await authedApi('/api/sync');
  if(!r) return false;
  if(r.profile){
    state.profile = {
      status:r.profile.status, nom:r.profile.nom, fonction:r.profile.fonction,
      weaknesses:r.profile.weaknesses||[], impulseFreq:r.profile.impulse_freq,
      income:Number(r.profile.income)||0, rent:Number(r.profile.rent)||0, charges:Number(r.profile.charges)||0,
    };
    // Le serveur fait foi : abonnement Stripe OU semaine offerte encore valable.
    state.isPremium = (r.premium !== undefined) ? !!r.premium : !!r.profile.is_premium;
    state.streak = r.profile.streak||0;
    state.savedTotal = Number(r.profile.saved_total)||0;
    state.sous = r.profile.sous||0;
    state.blockKeywords = r.profile.block_keywords||[];
    state.priceLimit = Number(r.profile.price_limit)||'';
    if(r.profile.lang && LANGS[r.profile.lang]) state.lang = r.profile.lang;
    state.pendingReferralDays = r.profile.pending_referral_days||0;
  } else {
    state.profile = null;
    state.pendingReferralDays = 0;
  }
  state.goals = (r.goals||[]).map(g=>({id:g.id, name:g.name, target:Number(g.target), current:Number(g.current)||0}));
  state.victories = (r.victories||[]).map(v=>({item:v.item, price:Number(v.price), when:'', goal:v.goal_name||''}));
  return true;
}
/* Pousse l'état courant vers le serveur (silencieux, ne bloque jamais l'UI) */
async function syncToServer(){
  if(!authSession || !state.profile) return;
  authedApi('/api/sync', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      profile:{
        nom:state.profile.nom||null, status:state.profile.status||null, fonction:state.profile.fonction||null,
        income:state.profile.income||0, rent:state.profile.rent||0, charges:state.profile.charges||0,
        weaknesses:state.profile.weaknesses||[], impulse_freq:state.profile.impulseFreq||null,
        streak:state.streak, saved_total:state.savedTotal, sous:state.sous,
        block_keywords:state.blockKeywords||[], price_limit:state.priceLimit||0, lang:state.lang,
        // Total de la semaine, pour le classement du tournoi (le serveur l'horodate au lundi courant).
        week_saved:(state.week||[]).reduce((s,d)=>s+(Number(d.amount)||0),0),
      },
      goals: state.goals,
      victories: state.victories,
    }),
  }).catch(()=>{});
}

privacy:[
{h:"Qui est responsable de tes données",b:"<p>Worthit est un service édité par son créateur, joignable à contact@worthit.app. C'est lui le responsable du traitement de tes données au sens du RGPD.</p>"},
{h:"Les données que nous collectons",b:"<p>Uniquement ce que tu saisis toi-même ou ce qui est nécessaire au fonctionnement :</p><ul><li><strong>Ton compte</strong> : ton adresse e-mail et un mot de passe (chiffré, jamais lisible par nous).</li><li><strong>Ton profil budgétaire</strong> : statut, fonction, revenus, loyer, charges, objectifs — tout est saisi manuellement par toi.</li><li><strong>Ton activité dans l'app</strong> : série (streak), sommes économisées, victoires, mots-clés de blocage, préférences (langue, thème).</li></ul><p><strong>Nous ne collectons jamais</strong> tes coordonnées bancaires : Worthit ne se connecte à aucun compte en banque, ni aujourd'hui ni demain.</p>"},
{h:"À quoi elles servent",b:"<p>À faire fonctionner le service : afficher ton reste-à-vivre, personnaliser les questions de l'agent Worthy, suivre ta progression, gérer ton abonnement. Nous ne faisons <strong>aucune publicité</strong> et ne <strong>revendons jamais</strong> tes données à qui que ce soit.</p>"},
{h:"Les prestataires que nous utilisons",b:"<p>Pour fonctionner, Worthit s'appuie sur trois sous-traitants de confiance :</p><ul><li><strong>Supabase</strong> (hébergement de la base de données et des comptes, serveurs en Union européenne).</li><li><strong>Stripe</strong> (paiement de l'abonnement). Tes données de carte sont saisies directement chez Stripe et ne transitent jamais par nos serveurs.</li><li><strong>OpenAI</strong> (agent conversationnel Worthy). Le contenu de tes échanges avec Worthy est transmis à OpenAI pour générer les réponses ; n'y écris pas d'informations que tu ne voudrais pas partager.</li></ul>"},
{h:"Cookies et stockage local",b:"<p>Nous n'utilisons pas de cookies publicitaires ni de traceurs tiers. Un stockage technique dans ton navigateur (localStorage) conserve ta session et tes préférences pour que tu n'aies pas à tout reconfigurer à chaque visite.</p>"},
{h:"Combien de temps nous les gardons",b:"<p>Tes données sont conservées tant que ton compte existe. Si tu supprimes ton compte, elles sont effacées de nos systèmes. Certaines informations de facturation peuvent être conservées par Stripe selon ses obligations légales.</p>"},
{h:"Tes droits",b:"<p>Conformément au RGPD, tu peux à tout moment : accéder à tes données, les corriger (directement depuis tes Paramètres), les exporter, ou demander leur suppression totale. Écris-nous à contact@worthit.app pour toute demande — nous y donnons suite dans les meilleurs délais.</p>"},
{h:"Sécurité",b:"<p>Les mots de passe sont chiffrés, les échanges se font en HTTPS, et chaque utilisateur ne peut accéder qu'à ses propres données (sécurité au niveau de la base). Aucun système n'est infaillible, mais nous prenons ces mesures au sérieux.</p>"},
{h:"Modifications",b:"<p>Cette politique peut évoluer. En cas de changement important, nous t'en informerons. La date de dernière mise à jour figure en haut de cette page.</p>"}
],

{h:"Le service",b:"<p>Worthit propose une version <strong>Gratuite</strong> (garde-fou, budget, série) et une version <strong>Premium</strong> payante (agent IA personnalisé, dashboard complet, thèmes, tournois). Nous faisons de notre mieux pour que le service soit disponible, sans pouvoir garantir un fonctionnement ininterrompu.</p>"},
{h:"Ton compte",b:"<p>Tu es responsable de la confidentialité de ton mot de passe et des actions faites depuis ton compte. Un compte par personne ; les informations que tu renseignes doivent être exactes.</p>"},
{h:"Abonnement, prix et résiliation",b:"<p>Premium coûte 2,99 €/mois ou 23,99 €/an, prélevés via Stripe. L'abonnement se renouvelle automatiquement jusqu'à résiliation. Tu peux <strong>résilier à tout moment</strong> depuis tes Paramètres ou en nous écrivant : tu conserves Premium jusqu'à la fin de la période déjà payée, puis repasses en Gratuit sans perdre ta série ni tes économies.</p>"},
{h:"Parrainage",b:"<p>Si tu invites un ami avec ton lien et qu'il <strong>souscrit à Premium</strong>, vous recevez chacun une semaine offerte, appliquée comme période d'essai sur un abonnement. L'offre suppose une vraie souscription de la personne parrainée ; tout usage abusif (faux comptes, auto-parrainage) peut entraîner l'annulation de l'avantage.</p>"},
{h:"Usage acceptable",b:"<p>Tu t'engages à ne pas détourner le service, à ne pas tenter d'y accéder frauduleusement, et à ne pas t'en servir à des fins illégales.</p>"},
{h:"Worthit n'est pas un conseiller financier",b:"<p>Worthit et l'agent Worthy fournissent une aide à la décision et des repères budgétaires, <strong>pas des conseils financiers ou d'investissement personnalisés</strong>. Les décisions d'achat ou d'épargne restent les tiennes. Pour des conseils professionnels, consulte un conseiller agréé.</p>"},
{h:"Responsabilité",b:"<p>Le service est fourni « en l'état ». Dans les limites permises par la loi, nous ne saurions être tenus responsables des décisions financières que tu prends ni d'éventuelles interruptions du service.</p>"},
{h:"Propriété intellectuelle",b:"<p>Le nom Worthit, son design et son code sont protégés. Tu ne peux pas les copier ou les réutiliser sans autorisation.</p>"},
{h:"Droit applicable",b:"<p>Ces conditions sont soumises au droit français. En cas de litige, une solution amiable sera recherchée en priorité.</p>"}
]},

privacy:[
{h:"Who is responsible for your data",b:"<p>Worthit is a service run by its creator, reachable at contact@worthit.app, who is the data controller under the GDPR.</p>"},
{h:"What we collect",b:"<p>Only what you enter yourself or what the service needs to run:</p><ul><li><strong>Your account</strong>: your email and a password (encrypted, never readable by us).</li><li><strong>Your budget profile</strong>: status, job, income, rent, expenses, goals — all entered manually by you.</li><li><strong>Your in-app activity</strong>: streak, amounts saved, victories, blocking keywords, preferences (language, theme).</li></ul><p><strong>We never collect</strong> your banking details: Worthit connects to no bank account, today or ever.</p>"},
{h:"What we use it for",b:"<p>To run the service: show your disposable income, personalize Worthy's questions, track your progress, manage your subscription. We run <strong>no advertising</strong> and <strong>never sell</strong> your data to anyone.</p>"},
{h:"The providers we use",b:"<p>Worthit relies on three trusted processors:</p><ul><li><strong>Supabase</strong> (database and account hosting, servers in the European Union).</li><li><strong>Stripe</strong> (subscription payments). Your card details are entered directly with Stripe and never pass through our servers.</li><li><strong>OpenAI</strong> (the Worthy chat agent). The content of your chats with Worthy is sent to OpenAI to generate replies; don't type anything you wouldn't want to share.</li></ul>"},
{h:"Cookies and local storage",b:"<p>We use no advertising cookies or third-party trackers. Technical storage in your browser (localStorage) keeps your session and preferences so you don't have to reconfigure everything on each visit.</p>"},
{h:"How long we keep it",b:"<p>Your data is kept as long as your account exists. If you delete your account, it is erased from our systems. Some billing information may be retained by Stripe under its legal obligations.</p>"},
{h:"Your rights",b:"<p>Under the GDPR, you can at any time access your data, correct it (right from your Settings), export it, or request full deletion. Email contact@worthit.app for any request — we act on it promptly.</p>"},
{h:"Security",b:"<p>Passwords are encrypted, traffic uses HTTPS, and each user can only access their own data (row-level security). No system is flawless, but we take these measures seriously.</p>"},
{h:"Changes",b:"<p>This policy may evolve. We'll notify you of any significant change. The last-updated date appears at the top of this page.</p>"}
],
terms:[
{h:"Purpose",b:"<p>These terms govern your use of Worthit, a tool that helps you cut down on impulse buying. By creating an account, you accept them.</p>"},
{h:"The service",b:"<p>Worthit offers a <strong>Free</strong> tier (guardrail, budget, streak) and a paid <strong>Premium</strong> tier (personal AI agent, full dashboard, themes, tournaments). We do our best to keep the service available, without guaranteeing uninterrupted operation.</p>"},
{h:"Your account",b:"<p>You are responsible for keeping your password confidential and for actions taken from your account. One account per person; the information you provide must be accurate.</p>"},
{h:"Subscription, price and cancellation",b:"<p>Premium costs €2.99/month or €23.99/year, charged via Stripe. The subscription renews automatically until cancelled. You can <strong>cancel anytime</strong> from your Settings or by emailing us: you keep Premium until the end of the period already paid, then return to Free without losing your streak or savings.</p>"},
{h:"Referrals",b:"<p>If you invite a friend with your link and they <strong>subscribe to Premium</strong>, you each get one free week, applied as a trial period on a subscription. The offer requires a genuine subscription by the referred person; any abuse (fake accounts, self-referral) may void the benefit.</p>"},
{h:"Acceptable use",b:"<p>You agree not to misuse the service, not to attempt fraudulent access, and not to use it for unlawful purposes.</p>"},
{h:"Worthit is not a financial advisor",b:"<p>Worthit and the Worthy agent provide decision support and budget guidance, <strong>not personalized financial or investment advice</strong>. Buying and saving decisions remain yours. For professional advice, consult a licensed advisor.</p>"},
{h:"Liability",b:"<p>The service is provided “as is”. To the extent permitted by law, we cannot be held liable for the financial decisions you make or for any service interruptions.</p>"},
{h:"Intellectual property",b:"<p>The Worthit name, design and code are protected. You may not copy or reuse them without permission.</p>"},
{h:"Governing law",b:"<p>These terms are governed by French law. In the event of a dispute, an amicable solution will be sought first.</p>"}
]},

privacy:[
{h:"Quién es responsable de tus datos",b:"<p>Worthit es un servicio editado por su creador, contactable en contact@worthit.app. Él es el responsable del tratamiento de tus datos según el RGPD.</p>"},
{h:"Qué datos recopilamos",b:"<p>Solo lo que tú introduces o lo necesario para funcionar:</p><ul><li><strong>Tu cuenta</strong>: tu e-mail y una contraseña (cifrada, nunca legible por nosotros).</li><li><strong>Tu perfil de presupuesto</strong>: estado, profesión, ingresos, alquiler, gastos, metas — todo introducido manualmente por ti.</li><li><strong>Tu actividad</strong>: racha, ahorros, victorias, palabras clave bloqueadas, preferencias (idioma, tema).</li></ul><p><strong>Nunca recopilamos</strong> tus datos bancarios: Worthit no se conecta a ninguna cuenta bancaria, ni hoy ni mañana.</p>"},
{h:"Para qué sirven",b:"<p>Para hacer funcionar el servicio: mostrar tu presupuesto restante, personalizar las preguntas del agente Worthy, seguir tu progreso y gestionar tu suscripción. No hacemos <strong>ninguna publicidad</strong> y <strong>nunca vendemos</strong> tus datos.</p>"},
{h:"Los proveedores que usamos",b:"<p>Worthit se apoya en tres subencargados de confianza:</p><ul><li><strong>Supabase</strong> (base de datos y cuentas, servidores en la Unión Europea).</li><li><strong>Stripe</strong> (pago de la suscripción). Los datos de tu tarjeta se introducen directamente en Stripe y nunca pasan por nuestros servidores.</li><li><strong>OpenAI</strong> (agente Worthy). Tus conversaciones con Worthy se envían a OpenAI para generar las respuestas; no escribas ahí información que no quieras compartir.</li></ul>"},
{h:"Cookies y almacenamiento local",b:"<p>No usamos cookies publicitarias ni rastreadores de terceros. Un almacenamiento técnico en tu navegador (localStorage) conserva tu sesión y tus preferencias.</p>"},
{h:"Cuánto tiempo los conservamos",b:"<p>Mientras exista tu cuenta. Si la eliminas, tus datos se borran de nuestros sistemas. Stripe puede conservar cierta información de facturación por obligación legal.</p>"},
{h:"Tus derechos",b:"<p>Según el RGPD, puedes en todo momento: acceder a tus datos, corregirlos (desde tus Ajustes), exportarlos o pedir su eliminación total escribiendo a contact@worthit.app.</p>"},
{h:"Seguridad",b:"<p>Contraseñas cifradas, conexiones HTTPS y cada usuario solo accede a sus propios datos (seguridad a nivel de base de datos). Ningún sistema es infalible, pero nos lo tomamos en serio.</p>"},
{h:"Cambios",b:"<p>Esta política puede evolucionar. Si hay cambios importantes, te lo comunicaremos. La fecha de actualización figura arriba.</p>"}
],
terms:[
{h:"Objeto",b:"<p>Estas condiciones rigen tu uso de Worthit, una herramienta que te ayuda a reducir tus compras impulsivas. Al crear una cuenta, las aceptas.</p>"},
{h:"El servicio",b:"<p>Worthit ofrece una versión <strong>Gratis</strong> (barrera, presupuesto, racha) y una versión <strong>Premium</strong> de pago (agente IA personal, panel completo, temas, torneos). Hacemos lo posible por mantener el servicio disponible, sin poder garantizar un funcionamiento ininterrumpido.</p>"},
{h:"Tu cuenta",b:"<p>Eres responsable de la confidencialidad de tu contraseña y de las acciones hechas desde tu cuenta. Una cuenta por persona; la información debe ser exacta.</p>"},
{h:"Suscripción, precio y cancelación",b:"<p>Premium cuesta 2,99 €/mes o 23,99 €/año, cobrados vía Stripe. La suscripción se renueva automáticamente hasta su cancelación. Puedes <strong>cancelar en cualquier momento</strong>: conservas Premium hasta el final del período pagado y vuelves a Gratis sin perder tu racha ni tus ahorros.</p>"},
{h:"Apadrinamiento",b:"<p>Si invitas a un amigo con tu enlace y él <strong>se suscribe a Premium</strong>, cada uno recibe una semana gratis, aplicada como período de prueba. La oferta requiere una suscripción real; cualquier abuso (cuentas falsas, auto-apadrinamiento) puede anular la ventaja.</p>"},
{h:"Uso aceptable",b:"<p>Te comprometes a no desviar el servicio, no intentar acceder de forma fraudulenta y no usarlo con fines ilegales.</p>"},
{h:"Worthit no es un asesor financiero",b:"<p>Worthit y el agente Worthy ofrecen ayuda a la decisión y referencias de presupuesto, <strong>no asesoramiento financiero o de inversión personalizado</strong>. Las decisiones son tuyas. Para consejo profesional, consulta a un asesor acreditado.</p>"},
{h:"Responsabilidad",b:"<p>El servicio se ofrece «tal cual». En los límites permitidos por la ley, no somos responsables de tus decisiones financieras ni de eventuales interrupciones del servicio.</p>"},
{h:"Propiedad intelectual",b:"<p>El nombre Worthit, su diseño y su código están protegidos. No puedes copiarlos ni reutilizarlos sin autorización.</p>"},
{h:"Ley aplicable",b:"<p>Estas condiciones se rigen por el derecho francés. En caso de litigio, se buscará primero una solución amistosa.</p>"}
]},

privacy:[
{h:"Wer für deine Daten verantwortlich ist",b:"<p>Worthit wird von seinem Gründer betrieben, erreichbar unter contact@worthit.app. Er ist der Verantwortliche im Sinne der DSGVO.</p>"},
{h:"Welche Daten wir erheben",b:"<p>Nur, was du selbst eingibst oder was für den Betrieb nötig ist:</p><ul><li><strong>Dein Konto</strong>: deine E-Mail-Adresse und ein Passwort (verschlüsselt, für uns nie lesbar).</li><li><strong>Dein Budget-Profil</strong>: Status, Beruf, Einkommen, Miete, Fixkosten, Ziele — alles von dir manuell eingetragen.</li><li><strong>Deine Aktivität</strong>: Serie, Ersparnisse, Siege, blockierte Schlagwörter, Einstellungen (Sprache, Theme).</li></ul><p><strong>Niemals erheben wir</strong> deine Bankdaten: Worthit verbindet sich mit keinem Bankkonto — weder heute noch morgen.</p>"},
{h:"Wofür wir sie nutzen",b:"<p>Um den Dienst zu betreiben: dein verfügbares Budget anzeigen, Worthys Fragen personalisieren, deinen Fortschritt verfolgen, dein Abo verwalten. Wir schalten <strong>keine Werbung</strong> und <strong>verkaufen deine Daten nie</strong>.</p>"},
{h:"Unsere Dienstleister",b:"<p>Worthit stützt sich auf drei vertrauenswürdige Auftragsverarbeiter:</p><ul><li><strong>Supabase</strong> (Datenbank und Konten, Server in der EU).</li><li><strong>Stripe</strong> (Abo-Zahlung). Deine Kartendaten gibst du direkt bei Stripe ein; sie laufen nie über unsere Server.</li><li><strong>OpenAI</strong> (Agent Worthy). Deine Chats mit Worthy werden zur Antworterzeugung an OpenAI übermittelt; schreibe dort nichts hinein, was du nicht teilen möchtest.</li></ul>"},
{h:"Cookies und lokaler Speicher",b:"<p>Keine Werbe-Cookies, keine Dritt-Tracker. Ein technischer Speicher im Browser (localStorage) bewahrt deine Sitzung und Einstellungen auf.</p>"},
{h:"Wie lange wir sie aufbewahren",b:"<p>Solange dein Konto besteht. Löschst du es, werden deine Daten aus unseren Systemen entfernt. Stripe kann Rechnungsdaten aus gesetzlichen Gründen länger aufbewahren.</p>"},
{h:"Deine Rechte",b:"<p>Gemäß DSGVO kannst du jederzeit: auf deine Daten zugreifen, sie korrigieren (direkt in den Einstellungen), sie exportieren oder ihre vollständige Löschung verlangen — per Mail an contact@worthit.app.</p>"},
{h:"Sicherheit",b:"<p>Verschlüsselte Passwörter, HTTPS-Verbindungen, und jeder Nutzer sieht nur seine eigenen Daten (Sicherheit auf Datenbankebene). Kein System ist unfehlbar, aber wir nehmen das ernst.</p>"},
{h:"Änderungen",b:"<p>Diese Erklärung kann sich weiterentwickeln. Über wichtige Änderungen informieren wir dich. Das Aktualisierungsdatum steht oben.</p>"}
],
terms:[
{h:"Gegenstand",b:"<p>Diese Bedingungen regeln deine Nutzung von Worthit, einem Tool gegen Impulskäufe. Mit der Kontoerstellung akzeptierst du sie.</p>"},
{h:"Der Dienst",b:"<p>Worthit bietet eine <strong>Gratis</strong>-Version (Geländer, Budget, Serie) und eine kostenpflichtige <strong>Premium</strong>-Version (persönlicher KI-Agent, volles Dashboard, Themes, Turniere). Wir bemühen uns um Verfügbarkeit, können aber keinen unterbrechungsfreien Betrieb garantieren.</p>"},
{h:"Dein Konto",b:"<p>Du bist für die Vertraulichkeit deines Passworts und die Aktionen deines Kontos verantwortlich. Ein Konto pro Person; deine Angaben müssen korrekt sein.</p>"},
{h:"Abo, Preis und Kündigung",b:"<p>Premium kostet 2,99 €/Monat oder 23,99 €/Jahr, abgebucht über Stripe. Das Abo verlängert sich automatisch bis zur Kündigung. Du kannst <strong>jederzeit kündigen</strong>: Premium bleibt bis zum Ende des bezahlten Zeitraums aktiv, danach wechselst du zu Gratis — ohne Verlust von Serie und Ersparnissen.</p>"},
{h:"Empfehlungsprogramm",b:"<p>Lädst du über deinen Link einen Freund ein und er <strong>schließt Premium ab</strong>, erhaltet ihr beide eine Gratiswoche als Testzeitraum. Voraussetzung ist ein echtes Abo; Missbrauch (Fake-Konten, Selbst-Einladung) kann zum Verlust des Vorteils führen.</p>"},
{h:"Zulässige Nutzung",b:"<p>Du verpflichtest dich, den Dienst nicht zu missbrauchen, keinen unbefugten Zugriff zu versuchen und ihn nicht für illegale Zwecke zu nutzen.</p>"},
{h:"Worthit ist kein Finanzberater",b:"<p>Worthit und der Agent Worthy bieten Entscheidungshilfe und Budget-Orientierung, <strong>keine personalisierte Finanz- oder Anlageberatung</strong>. Deine Entscheidungen bleiben deine. Für professionellen Rat wende dich an einen zugelassenen Berater.</p>"},
{h:"Haftung",b:"<p>Der Dienst wird „wie besehen“ bereitgestellt. Im gesetzlich zulässigen Rahmen haften wir weder für deine finanziellen Entscheidungen noch für etwaige Unterbrechungen.</p>"},
{h:"Geistiges Eigentum",b:"<p>Name, Design und Code von Worthit sind geschützt. Kopieren oder Weiterverwenden ohne Genehmigung ist untersagt.</p>"},
{h:"Anwendbares Recht",b:"<p>Es gilt französisches Recht. Bei Streitigkeiten wird zunächst eine gütliche Einigung gesucht.</p>"}
]},

{h:"Wie verantwoordelijk is voor je gegevens",b:"<p>Worthit wordt uitgegeven door zijn maker, bereikbaar via contact@worthit.app. Hij is de verwerkingsverantwoordelijke in de zin van de AVG.</p>"},

function t(key,vars){
  const loc = T[state.lang];
  let s = (loc && loc.ui && loc.ui[key]) || T.fr.ui[key] || key;
  if(vars) for(const k in vars) s = s.replace('{'+k+'}', vars[k]);
  return s;
}
function QZ(i){ const b=QUIZ[i], tr=T[state.lang]&&T[state.lang].quiz&&T[state.lang].quiz[i]; return tr?{q:tr.q,options:tr.o,answer:b.answer,stat:tr.stat,explain:tr.explain}:b; }
function FT(i){ const b=FEATURES[i], tr=T[state.lang]&&T[state.lang].feat&&T[state.lang].feat[i]; return tr?{...b,title:tr.t,desc:tr.d,long:tr.l||b.long}:b; }
function SCI(i){ const b=SHOWCASE_ITEMS[i], tr=T[state.lang]&&T[state.lang].show&&T[state.lang].show[i]; return tr?{...b,title:tr.t,desc:tr.d}:b; }
function FAQI(i){ const b=FAQ[i], tr=T[state.lang]&&T[state.lang].faq&&T[state.lang].faq[i]; return tr||b; }
function PERKS(kind){ const loc=T[state.lang]; return (loc&&loc[kind])||T.fr[kind]; }

function saveLocal(){
  try{
    localStorage.setItem('worthit_v1', JSON.stringify({
      introDone:state.introDone, profile:state.profile, goals:state.goals,
      streak:state.streak, savedTotal:state.savedTotal, sous:state.sous,
      week:state.week, victories:state.victories, victoryCount:state.victoryCount,
      blockKeywords:state.blockKeywords, priceLimit:state.priceLimit,
      owned:state.owned, activeAvatar:state.activeAvatar, activeTheme:state.activeTheme,
      isPremiumDemo:state.isPremium, authNom:state.auth.nom, lang:state.lang,
      agentFreeUsed:(typeof agent!=='undefined'?agent.freeUsed:0), agentFreeDate:(new Date()).toDateString(),
    }));
    // Canal de synchro avec l'extension Chrome : elle lit cette clé quand tu visites le site.
    localStorage.setItem('worthit_ext_sync', JSON.stringify({keywords:state.blockKeywords||[], priceLimit:state.priceLimit||0, ts:Date.now()}));
  }catch(e){}
  if(typeof syncToServer==='function') syncToServer();
}
function loadLocal(){
  try{
    const d = JSON.parse(localStorage.getItem('worthit_v1')||'null');
    if(!d) return;
    state.introDone = !!d.introDone;
    state.profile = d.profile||null;
    state.goals = Array.isArray(d.goals)?d.goals:[];
    state.streak = d.streak||0; state.savedTotal = d.savedTotal||0; state.sous = d.sous||0;
    if(Array.isArray(d.week) && d.week.length===7) state.week = d.week;
    state.victories = Array.isArray(d.victories)?d.victories:[];
    // Comptes créés avant l'ajout du compteur : on repart au moins du nombre de victoires connues.
    state.victoryCount = Number(d.victoryCount) || state.victories.length;
    if(Array.isArray(d.blockKeywords)) state.blockKeywords = d.blockKeywords;
    if(d.priceLimit!==undefined) state.priceLimit = d.priceLimit;
    if(Array.isArray(d.owned)) state.owned = d.owned;
    if(d.activeAvatar) state.activeAvatar = d.activeAvatar;
    if(d.activeTheme){
      state.activeTheme = d.activeTheme;
      const th = SHOP_THEMES.find(t=>t.id===d.activeTheme);
      if(th){ document.documentElement.style.setProperty('--accent-1',th.c1); document.documentElement.style.setProperty('--accent-2',th.c2); }
    }
    state.isPremium = !!d.isPremiumDemo;
    if(d.authNom) state.auth.nom = d.authNom;
    if(d.lang && LANGS[d.lang]) state.lang = d.lang;
    // compteur de questions gratuites : remis à zéro chaque jour
    if(typeof agent!=='undefined' && d.agentFreeDate === (new Date()).toDateString()) agent.freeUsed = d.agentFreeUsed||0;
  }catch(e){}
}

function computeBudget(p){
  const income=Number(p.income)||0, rent=Number(p.rent)||0, charges=Number(p.charges)||0;
  return {income,rent,charges,left:Math.max(0,income-rent-charges)};
}
function generateQuestion(product,profile,goal){
  const {left}=computeBudget(profile);
  const pct = left>0 ? Math.round((product.price/left)*100) : null;
  if(goal && pct) return `Ça représente ${pct} % de ce qu'il te reste ce mois-ci. Ton objectif « ${esc(goal.name)} » avancerait plus lentement. Toujours partant·e ?`;
  if(pct) return `Ça représente ${pct} % de ce qu'il te reste ce mois-ci. Vraiment nécessaire, ou juste une envie du moment ?`;
  return "Est-ce que tu en as vraiment besoin, ou juste envie ?";
}

/* ============================== TOASTS / CONFETTI ============================== */
function toast(msg,icon){
  icon=icon||'sparkles';
  const id='t'+Date.now()+Math.random();
  state.toasts.push({id,msg,icon});
  renderToasts();
  setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);renderToasts();},3400);
}
function renderToasts(){
  document.getElementById('toast-root').innerHTML = state.toasts.map(t=>
    `<div class="toast glass">${I(t.icon,16)}<span>${esc(t.msg)}</span></div>`
  ).join('');
}
function confettiBurst(el){
  if(REDUCED) return;
  const rect = el ? el.getBoundingClientRect() : {left:innerWidth/2,top:innerHeight/2,width:0,height:0};
  const root = document.getElementById('confetti-root');
  for(let i=0;i<30;i++){
    const p=document.createElement('span');
    p.className='confetti-piece';
    const angle=Math.random()*Math.PI*2, dist=70+Math.random()*160;
    p.style.setProperty('--tx',(Math.cos(angle)*dist)+'px');
    p.style.setProperty('--ty',(Math.sin(angle)*dist-50)+'px');
    p.style.left=(rect.left+rect.width/2)+'px';
    p.style.top=(rect.top+rect.height/2)+'px';
    p.style.background = Math.random()>0.45 ? 'var(--v1)' : 'var(--gold-1)';
    p.style.animationDelay=(Math.random()*0.12)+'s';
    root.appendChild(p);
    setTimeout(()=>p.remove(),1300);
  }
}

/* ============================== ROUTING ============================== */
/* Chaque page adressable a une vraie URL : partageable, rechargeable (F5),
 * et le bouton retour du navigateur fonctionne. Les étapes transitoires
 * (intro, onboarding) n'en ont pas — ce sont des moments, pas des destinations. */
const ROUTES = {
  accueil:'/', fonctionnalites:'/fonctionnalites', tarifs:'/tarifs', classement:'/tournois',
  showcase:'/decouvrir', apropos:'/a-propos',
  confidentialite:'/confidentialite', cgu:'/cgu',
  connexion:'/connexion', dashboard:'/dashboard', boutique:'/boutique', parametres:'/parametres',
};
const PAGE_BY_PATH = {};
for(const id in ROUTES) PAGE_BY_PATH[ROUTES[id]] = id;
const PRIVATE_PAGES = ['dashboard','boutique','parametres'];

function pathForPage(id){ return ROUTES[id] || '/'; }
function pageForPath(p){ return PAGE_BY_PATH[(p||'/').replace(/\/+$/,'') || '/'] || null; }
/* Une page privée ouverte au chargement sans compte local renvoie vers la connexion. */
function guardPage(id){
  if(!PageMap[id]) return 'accueil';
  if(PRIVATE_PAGES.indexOf(id)>=0 && !state.profile) return 'connexion';
  return id;
}

function nav(id){
  state.page=id; state.menuOpen=false;
  try{ history.pushState({page:id}, '', pathForPage(id)); }catch(e){}
  render(true);
}
window.addEventListener('popstate', function(e){
  const id = (e.state && e.state.page) || pageForPath(location.pathname) || 'accueil';
  state.page = guardPage(id); state.menuOpen=false;
  render(true);
});
function toggleMenu(){ state.menuOpen=!state.menuOpen; renderNavOnly(); }
function renderNavOnly(){
  document.getElementById('nav-root').outerHTML = Navbar();
}

function render(scrollTop){
  document.getElementById('app').innerHTML = Navbar() + '<main class="page-enter" key="'+state.page+'">' + (PageMap[state.page]||PageMap.accueil)() + '</main>' + Footer();
  if(scrollTop) window.scrollTo({top:0,behavior:REDUCED?'auto':'smooth'});
  mount();
}
function mount(){
  initReveal();
  initTilt(document);
}

function quizPick(i){
  if(quiz.revealed) return;
  quiz.picked=i; quiz.revealed=true;

}
function quizNext(){
  if(quiz.i<QUIZ.length-1){ quiz.i++; quiz.picked=null; quiz.revealed=false; render(true); }
  else { quiz.finished=true; render(true); }
}

async function subscribe(btn){
  if(state.isPremium){ toast('Ton abonnement Premium est déjà actif.', 'crown'); return; }
  if(!authSession){ toast('Crée ton compte pour passer Premium.','user'); nav('connexion'); return; }
  const refCode = pendingReferral();
  const r = await authedApi('/api/create-checkout-session',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({billing:state.billing, refCode: refCode||undefined}),
  });
  if(r && r.url){
    try{ localStorage.removeItem('worthit_ref_pending'); }catch(e){}
    window.location.href = r.url; return;
  }
  // Pas de backend Stripe joignable : mode démo local
  state.isPremium=true;
  saveLocal(); syncToServer();

/* État des amis, chargé depuis le serveur (aucune donnée fictive). */
const friendsState = {monId:null, amis:[], demandesRecues:[], demandesEnvoyees:[], classement:[],
                      semainesOffertesRestantes:0, loaded:false, loading:false, erreur:null};

async function loadFriends(force){
  if(friendsState.loading) return;
  if(friendsState.loaded && !force) return;
  if(!authSession){ friendsState.loaded=true; return; }
  friendsState.loading = true;
  try{
    const r = await authedApi('/api/friends');
    if(r && !r.error) Object.assign(friendsState, r, {erreur:null});
    else friendsState.erreur = "Impossible de charger tes amis pour l'instant.";
  }catch(e){ friendsState.erreur = "Impossible de charger tes amis pour l'instant."; }
  friendsState.loaded = true; friendsState.loading = false;
  if(state.page==='classement') render();
}

function copierMonId(){
  if(!friendsState.monId) return;
  // writeText() renvoie une Promise : sans l'attendre, un échec (permission refusée,
  // contexte non sécurisé) passait inaperçu et le toast annonçait un succès mensonger.
  const ok = () => toast('Identifiant copié — envoie-le à ton ami.','link');
  const echec = () => toast('Copie impossible, note-le à la main.','link');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(friendsState.monId).then(ok).catch(echec);
  } else echec();
}
async function envoyerDemandeAmi(){
  const input = document.getElementById('friend-id-input');
  if(!input) return;
  const code = (input.value||'').replace(/\D/g,'');
  if(code.length!==8){ toast('Un identifiant fait 8 chiffres.','users'); return; }
  const r = await authedApi('/api/friends/request', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({friendId:code}),
  });
  const messages = {introuvable:"Aucun compte avec cet identifiant.", soi_meme:"C'est ton propre identifiant 🙂",
                    deja_ami:"Vous êtes déjà amis.", demande_en_cours:"Une demande est déjà en cours.",
                    identifiant_invalide:"Un identifiant fait 8 chiffres."};
  if(r && r.ok){ input.value=''; toast(`Demande envoyée à ${r.nom}.`,'users'); await loadFriends(true); render(); }
  else toast(messages[r && r.error] || "Échec de l'envoi.", 'users');
}
async function accepterAmi(lien){
  const r = await authedApi('/api/friends/accept', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({lien}),
  });
  if(r && r.ok){
    // C'est celui qui a envoyé la demande qui reçoit la semaine offerte, pas nous qui acceptons.
    if(r.semaineOfferte){ confettiBurst(null); toast('Ami ajouté — il reçoit 1 semaine Premium offerte ✨','crown'); }
    else toast('Ami ajouté.','users');
    await loadFriends(true); render();
  } else toast("Impossible d'accepter cette demande.",'users');
}
async function retirerAmi(lien){
  const r = await authedApi('/api/friends/remove', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({lien}),
  });
  if(r && r.ok){ await loadFriends(true); render(); }
}

/* Récupère ce qui est tapé dans les champs avant tout re-rendu : sans ça,

function captureAuthFields(){
  const v = id => { const el = document.getElementById(id); return el ? el.value : null; };
  const nom = v('f-nom'), email = v('f-email'), pass = v('f-pass');
  if(nom !== null) state.auth.nom = nom;

}
function switchAuthMode(m){ captureAuthFields(); state.auth.mode=m; state.auth.errors={}; render(); }
/* Afficher/masquer le mot de passe se fait sur place : re-rendre toute la page
 * ferait clignoter l'écran, perdrait le focus et effacerait la saisie. */
function toggleShowPass(){
  const a = state.auth;
  a.showPass = !a.showPass;
  const input = document.getElementById('f-pass');
  if(!input){ render(); return; }
  const pos = input.selectionStart;
  input.type = a.showPass ? 'text' : 'password';
  const btn = input.parentElement && input.parentElement.querySelector('.field-toggle');
  if(btn){
    btn.innerHTML = I(a.showPass?'eyeOff':'eye',16);
    btn.setAttribute('aria-label', a.showPass ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
  }
  input.focus();
  try{ input.setSelectionRange(pos, pos); }catch(e){}
}
async function submitAuth(){
  const a=state.auth;
  const nom = a.mode==='inscription' ? (document.getElementById('f-nom')?.value||'') : '';
  const email = document.getElementById('f-email').value;
  const pass = document.getElementById('f-pass').value;
  a.nom=nom; a.email=email; a.pass=pass;
  const errors={};
  if(a.mode==='inscription' && nom.trim().length<2) errors.nom='Trop court.';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) errors.email='E-mail invalide.';
  if(pass.length<6) errors.pass='6 caractères minimum.';
  a.errors=errors;
  if(Object.keys(errors).length){ render(); return; }

  if(!sb){
    // Pas de connexion à Supabase (mode démo hors-ligne / artifact) : on garde l'ancien comportement local.
    a.done=true; saveLocal(); render();
    return;
  }

  a.loading = true; render();
  try{
    let result;
    if(a.mode==='inscription'){
      result = await sb.auth.signUp({ email, password:pass, options:{ data:{ nom } } });
    } else {
      result = await sb.auth.signInWithPassword({ email, password:pass });
    }
    if(result.error) throw result.error;
    authSession = result.data.session;
    if(authSession) state.userEmail = authSession.user.email;
    if(!authSession){
      // Inscription avec confirmation e-mail activée : pas de session immédiate.
      a.loading=false;
      a.errors = { email: "Compte créé ! Vérifie ta boîte mail pour confirmer, puis connecte-toi." };
      switchAuthMode('connexion');
      return;
    }
    await syncFromServer();
    a.loading=false; a.done=true; saveLocal();
  }catch(err){
    a.loading=false;
    a.errors = { email: translateAuthError(err && err.message) };
  }
  render();
}

    o.income=document.getElementById('ob-income').value;

  if(o.step===4){
    o.goalName=document.getElementById('ob-goal-name').value.trim();

/* ============================== CORRECTION D'UNE VICTOIRE ============================== */
/* Retire les effets d'une victoire (montant, crans, objectif) sans jamais passer en négatif —
 * utilisé à la fois par la suppression et par la modification (qui retire puis réapplique). */
function retirerEffetsVictoire(v){
  state.savedTotal = Math.max(0, state.savedTotal - v.price);
  state.sous = Math.max(0, state.sous - Math.max(5, Math.round(v.price/10)));
  const goal = state.goals.find(g=>g.name===v.goal);
  if(goal) goal.current = Math.max(0, goal.current - v.price);
}
function appliquerEffetsVictoire(item, price, goal){
  state.savedTotal += price;
  state.sous += Math.max(5, Math.round(price/10));
  if(goal) goal.current = Math.min(goal.target, goal.current + price);
}
function supprimerVictoire(i){
  const v = state.victories[i];
  if(!v) return;
  retirerEffetsVictoire(v);
  state.victoryCount = Math.max(0, (state.victoryCount||0) - 1);
  state.victories.splice(i,1);
  saveLocal();
  toast('Victoire supprimée.','x');
  render();
}
function editVictory(i){
  const v = state.victories[i];
  if(!v) return;
  const plusieurs = state.goals.length>1;

function saveEditVictory(i){
  const v = state.victories[i];
  if(!v) return;
  const item = document.getElementById('evic-item').value.trim();
  const price = Number(document.getElementById('evic-price').value);
  if(!item || !(price>0)){ toast("Indique l'achat et son prix.",'bag'); return; }
  const selecteur = document.getElementById('evic-goal');
  const goal = selecteur ? state.goals.find(g=>String(g.id)===selecteur.value) : state.goals.find(g=>g.name===v.goal);
  retirerEffetsVictoire(v);               // annule l'ancien montant/crans/objectif
  appliquerEffetsVictoire(item, price, goal); // réapplique avec les nouvelles valeurs
  v.item = item; v.price = price; v.goal = goal ? goal.name : v.goal;
  closeModal(); saveLocal();

  render();

function shopGridHtml(tab){
  const tabs = {avatars:SHOP_AVATARS, themes:SHOP_THEMES, rare:SHOP_RARE};
  const items = tabs[tab];
  return items.map(item=>{
    const isPremiumLocked = item.tier==='premium' && !state.isPremium;
    const isOwned = !isPremiumLocked && (state.owned.includes(item.id) || item.price===0);
    const isEquipped = (tab==='avatars' && state.activeAvatar===item.id) || (tab==='themes' && state.activeTheme===item.id);
    const canAfford = state.sous>=item.price;
    let visual='';
    if(tab==='avatars'){
      // L'avatar « Ton initiale » n'a pas d'icône : on prévisualise la vraie initiale.
      const initiale = ((state.profile&&state.profile.nom)||'').trim()[0];
      visual = `<div style="width:52px;height:52px;border-radius:50%;background:${item.grad};margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;">${item.icon?I(item.icon,24,1.6):esc((initiale||item.label||'W').toUpperCase())}</div>`;
    }
    if(tab==='themes') visual = `<div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,${item.c1},${item.c2});margin:0 auto 14px;position:relative;">${item.tier==='premium'?`<span style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--grad-gold);display:flex;align-items:center;justify-content:center;color:#1a1206;">${I('crown',10)}</span>`:''}</div>`;
    /* Les objets rares se méritent : on montre la progression, pas un prix. */
    if(tab==='rare'){
      const p = rareProgres(item);
      const couleur = RARE_COULEURS[item.rarity] || 'var(--v1)';
      const pct = Math.min(100, Math.round((p.actuel / p.cible) * 100));
      return `<div class="glass tilt" style="border-radius:18px;padding:20px 16px;text-align:center;opacity:${p.atteint?1:.82};">
        <div style="width:52px;height:52px;border-radius:14px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:${p.atteint?`linear-gradient(135deg,${couleur},rgba(0,0,0,.25))`:'rgba(255,255,255,.04)'};border:1px solid ${p.atteint?couleur:'var(--line)'};color:${p.atteint?'#fff':'var(--ink-faint)'};">
          ${p.atteint ? I(item.icon||'gem',22) : I('lock',20)}
        </div>
        <p style="font-size:13.5px;font-weight:600;color:${p.atteint?'#fff':'var(--ink-dim)'};margin:0 0 3px;">${esc(item.name)}</p>
        <p style="font-size:11px;color:${couleur};margin:0 0 9px;font-weight:600;">${esc(item.rarity)}</p>
        <p style="font-size:11.5px;color:var(--ink-faint);margin:0 0 8px;">${esc(p.texte)}</p>
        ${p.atteint
          ? `<span style="font-size:12px;color:${couleur};display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600;">${I('check',13)} Obtenu</span>`
          : `<div style="height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-bottom:6px;">
               <div style="height:100%;width:${pct}%;background:${couleur};border-radius:99px;transition:width .5s var(--ease);"></div>
             </div>
             <p class="tabular" style="font-size:11px;color:var(--ink-faint);margin:0;">${p.actuel} / ${p.cible}</p>`}
      </div>`;
    }
    return `<div class="glass tilt" style="border-radius:18px;padding:20px 16px;text-align:center;">
      ${visual}
      <p style="font-size:13.5px;font-weight:600;color:#fff;margin:0 0 4px;">${esc(item.name)}</p>
      <div style="margin-bottom:10px;"></div>
      ${isPremiumLocked ? `<button onclick="nav('tarifs')" class="btn btn-gold btn-sm btn-block">${I('crown',12)} Premium</button>`
        : isEquipped ? `<span style="font-size:12px;color:var(--v1);display:flex;align-items:center;justify-content:center;gap:5px;">${I('check',13)} Actif</span>`
        : isOwned ? `<button onclick="equipItem('${tab}','${item.id}')" class="btn btn-ghost btn-sm btn-block">Équiper</button>`
        : `<button ${canAfford?`onclick="buyItem('${tab}','${item.id}',${item.price},this)"`:'disabled'} class="btn ${canAfford?'btn-neon':'btn-ghost'} btn-sm btn-block">${I('coins',12)} ${item.price}</button>`}
    </div>`;
  }).join('');
}
function setShopTab(tab){
  state.shopTab=tab;
  document.querySelectorAll('[data-tab]').forEach(el=>el.classList.toggle('active', el.getAttribute('data-tab')===tab));
  const grid=document.getElementById('shop-grid');
  grid.innerHTML = shopGridHtml(tab);
  initTilt(grid);
}
function buyItem(tab,id,price,btn){
  state.sous -= price;
  state.owned.push(id);
  saveLocal();
  document.getElementById('shop-sous').textContent = crans(state.sous);
  confettiBurst(btn);
  toast('Objet débloqué !','gem');
  const grid=document.getElementById('shop-grid');
  grid.innerHTML = shopGridHtml(tab);
  initTilt(grid);
}
function equipItem(tab,id){
  if(tab==='avatars') state.activeAvatar=id;
  if(tab==='themes'){
    state.activeTheme=id;
    const th = SHOP_THEMES.find(t=>t.id===id);
    if(th){ document.documentElement.style.setProperty('--accent-1',th.c1); document.documentElement.style.setProperty('--accent-2',th.c2); }
    toast('Thème appliqué','palette');
  }
  saveLocal();
  const grid=document.getElementById('shop-grid');
  if(grid){ grid.innerHTML = shopGridHtml(tab); initTilt(grid); }
  else render();
}

function simVal(id){ const el=document.getElementById(id); return el ? Math.max(0, +el.value||0) : 0; }
function simSync(key, v){
  v = Math.max(0, +v||0);
  const r=document.getElementById('sim-'+key), n=document.getElementById('sim-'+key+'-num');
  if(r) r.value=v;
  if(n && +n.value!==v) n.value=v;
  simUpdate();
}
function simMonths(){
  const custom = simVal('sim-months-custom');
  if(custom>0) return custom;
  return +(document.querySelector('#sim-months-row .filter-pill.active')?.dataset.months || 12);
}
function simUpdate(){
  const skip = simVal('sim-skip-num');
  const price = simVal('sim-price-num');
  const months = simMonths();
  const monthly = skip*price;
  const total = monthly*months;
  document.getElementById('sim-total').textContent = total.toLocaleString('fr-FR')+' €';
  document.getElementById('sim-monthly').textContent = monthly.toLocaleString('fr-FR')+' €';
  document.getElementById('sim-premium').textContent = Math.max(0,Math.round(monthly/2.99));
  const goalName = (document.getElementById('sim-goal-name').value||'').trim() || '—';
  const goalTarget = Math.max(1, simVal('sim-goal-target')||1800);
  document.getElementById('sim-vs-label').textContent = t('sim.vsLabel')+' « '+goalName+' » ('+goalTarget.toLocaleString('fr-FR')+' €)';
  document.getElementById('sim-bar').style.width = Math.min(100, Math.round(total/goalTarget*100))+'%';
}

/* ============================== REVEAL / TILT / COUNTUP ============================== */
let revealObs;
function initReveal(){
  if(revealObs) revealObs.disconnect();
  if(REDUCED) return;
  revealObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add('visible');
        if(e.target.dataset.countup!==undefined) runCountUp(e.target);
        revealObs.unobserve(e.target);
      }
    });
  },{threshold:.14});
  document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));
  document.querySelectorAll('[data-countup]').forEach(el=>{ if(!el.closest('.reveal')) revealObs.observe(el); });
}
function runCountUp(el){
  const end = parseFloat(el.dataset.countup);
  const suffix = el.dataset.suffix||'';
  const dec = parseInt(el.dataset.dec||'0',10);
  const t0 = performance.now(), dur=1300;
  function tick(t){
    const p = Math.min(1,(t-t0)/dur);
    const v = end*(1-Math.pow(1-p,3));
    el.textContent = v.toFixed(dec).replace('.',',')+suffix;
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function initTilt(root){
  if(REDUCED) return;
  root.querySelectorAll('.tilt').forEach(card=>{
    card.addEventListener('pointermove',e=>{
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
      const rx=(py-0.5)*-9, ry=(px-0.5)*9;
      card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`;
    });
    card.addEventListener('pointerleave',()=>{ card.style.transform=''; });
  });
}


/* ============================== AMBIENT PARTICLE FIELD ============================== */
(function initParticles(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w,h,particles=[];
  function resize(){
    w = canvas.width = innerWidth * Math.min(devicePixelRatio||1,1.5);
    h = canvas.height = innerHeight * Math.min(devicePixelRatio||1,1.5);
    canvas.style.width = innerWidth+'px';
    canvas.style.height = innerHeight+'px';
  }
  function seed(){
    particles = Array.from({length:32},()=>({
      x:Math.random()*w, y:Math.random()*h,
      r:(Math.random()*1.6+0.4)*Math.min(devicePixelRatio||1,1.5),
      vx:(Math.random()-0.5)*0.12, vy:(Math.random()-0.5)*0.12,
      hue: Math.random()>0.78 ? 'gold' : 'violet',
      a: Math.random()*0.5+0.15,
    }));
  }
  resize(); seed();
  window.addEventListener('resize', ()=>{ resize(); });
  function draw(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      if(!REDUCED){ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0; }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.hue==='gold' ? `rgba(251,205,107,${p.a})` : `rgba(167,139,250,${p.a})`;
      ctx.fill();
    });
    if(!REDUCED) requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================== AGENT IA (Worthy) ============================== */
/* Worthy : 3 questions offertes par jour en Gratuit, illimité en Premium */
const AGENT_FREE_LIMIT = 3;
const agent = {open:false, messages:[], typing:false, greeted:false, freeUsed:0};
const NO_PROFILE_CTX = {status:null, income:0, rent:0, charges:0, nom:''};
function agentLimitReached(){ return !state.isPremium && agent.freeUsed>=AGENT_FREE_LIMIT; }

/*
 * POINT DE BRANCHEMENT API :
 * en production, remplace agentBrain() par un appel fetch() vers TON backend,
 * qui lui-même appelle l'API du LLM (OpenAI, Claude...) avec ta clé secrète.
 * La clé ne doit JAMAIS être dans ce fichier front.
 */
function agentBrain(raw){
  const t = raw.toLowerCase();
  const p = state.profile || NO_PROFILE_CTX;
  const b = computeBudget(p);
  const name = (p.nom||'').trim();
  const m = raw.match(/(\d+[.,]?\d*)\s*€?/);
  if(m && parseFloat(m[1].replace(',','.'))>0){
    const price = parseFloat(m[1].replace(',','.'));
    const pct = b.left>0 ? Math.round(price/b.left*100) : null;
    const goal = state.goals[0];
    if(pct===null) return "Ton budget du mois est déjà à zéro… c'est peut-être le signal le plus clair qu'on puisse avoir, non ?";
    if(pct>=50) return `${price} €, c'est ${pct} % de ce qu'il te reste ce mois-ci (${b.left} €). Presque la moitié de ta marge.\n\nMa suggestion : on pose une pause de 24 h. Si demain tu y penses encore, on en reparle.`;
    if(pct>=20) return `Ça représente ${pct} % de ton reste-à-vivre (${b.left} €). Ton objectif « ${goal.name} » avancerait plus lentement.\n\nQuestion honnête : besoin réel, ou envie du moment ?`;
    return `${price} €, soit ${pct} % de ce qu'il te reste. C'est raisonnable — mais est-ce que tu l'aurais acheté la semaine dernière ? Si la réponse est non, c'est peut-être l'algorithme qui a gagné, pas toi.`;
  }
  if(/budget|reste|argent|combien/.test(t)) return `Ce mois-ci il te reste ${b.left} € une fois le loyer (${b.rent} €) et les charges (${b.charges} €) déduits de tes ${b.income} €.\n\nEt tu as déjà gardé ${state.savedTotal} € en résistant. Pas mal, non ?`;
  if(/motiv|encourag|craquer|envie|dur/.test(t)) return `${name?name+', t':'T'}a série tient depuis ${state.streak} jours. 🔥\n\nChaque euro non dépensé va vers « ${state.goals[0].name} » — il en manque ${state.goals[0].target-state.goals[0].current} €. Le sneaker de trop ne te rapprochera de rien du tout.`;
  if(/objectif|japon|voyage|épargne|epargne/.test(t)) return state.goals.map(g=>`« ${g.name} » : ${g.current} / ${g.target} € (${Math.round(g.current/g.target*100)} %)`).join('\n') + '\n\nChaque refus fait avancer ces barres. Tu veux simuler un achat pour voir son impact ?';
  if(/bonjour|salut|hello|coucou|hey/.test(t)) return `Salut${name?' '+name:''} ! Une envie d'achat te trotte dans la tête ? Dis-moi quoi et à quel prix, on regarde ensemble ce que ça pèse vraiment.`;
  if(/merci|top|cool|nickel/.test(t)) return "Avec plaisir. Je suis là au moment du doute — c'est exactement mon travail. 💜";
  return "Dis-m'en plus : c'est quoi, et ça coûte combien ? Donne-moi un prix et je te montre ce que ça représente sur ton mois.";
}

function agentGreeting(){
  const p = state.profile || NO_PROFILE_CTX;
  const name = (p.nom||'').trim();
  let g = t('agent.greet', {nom: name ? ' ' + name : ''});
  if(!state.isPremium) g += `\n\n` + t('agent.greetFree', {n: AGENT_FREE_LIMIT});
  if(!state.profile) g += `\n\n` + t('agent.greetProfile');
  return g;
}

}
function agentContext(){
  const p = state.profile || NO_PROFILE_CTX;
  const b = computeBudget(p);
  return {nom:(p.nom||'').trim()||null, statut:p.status, fonction:p.fonction||null,
          faiblesses:p.weaknesses||[], frequenceImpulsions:p.impulseFreq||null, langue:state.lang,

          revenu:b.income, loyer:b.rent, charges:b.charges, reste:b.left,

async function sendAgentMessage(text){
  text = (text||'').trim();
  if(!text || agent.typing || agentLimitReached()) return;
  const history = agent.messages.slice(-10);
  agent.messages.push({who:'user',text});
  if(!state.isPremium){ agent.freeUsed++; saveLocal(); }
  agent.typing = true;
  renderAgent();
  const minDelay = new Promise(r=>setTimeout(r, REDUCED ? 60 : 850 + Math.random()*500));
  const req = api('/api/chat',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({cid:CID, message:text, history, context:agentContext()}),
  });
  const [,r] = await Promise.all([minDelay, req]);
  agent.typing = false;
  agent.messages.push({who:'bot', text:(r && r.reply) ? r.reply : agentBrain(text)});
  if(agentLimitReached()) agent.messages.push({who:'bot',text:`Tes ${AGENT_FREE_LIMIT} questions gratuites du jour sont épuisées. ✨\n\nAvec Premium (2,99 €/mois), je suis là sans limite — et je connais ton profil par cœur.`});
  renderAgent();
}
function agentQuick(text){ sendAgentMessage(text); }
function sendAgentFromInput(){
  const input = document.getElementById('agent-input');
  if(!input) return;
  const v = input.value;

}

    : (limited ? 'Questions gratuites du jour épuisées' : `Gratuit — ${remaining} question${remaining>1?'s':''} offerte${remaining>1?'s':''} aujourd'hui`);
  root.innerHTML = `
    ${agent.open ? `<div class="agent-panel" id="agent-panel" role="dialog" aria-label="Assistant Worthy">

        <div class="agent-avatar">${I('brain',19)}</div>

          <p style="font-size:11px;color:var(--ink-dim);margin:2px 0 0;"><span class="agent-status-dot"></span>${statusLine}</p>
        </div>
        <button onclick="toggleAgent()" aria-label="Fermer" style="background:none;border:none;cursor:pointer;color:var(--ink-dim);padding:6px;display:flex;">${I('x',17)}</button>
      </div>
      <div class="agent-msgs" id="agent-msgs">
        ${agent.messages.map(m=>`<div class="a-msg ${m.who}">${esc(m.text)}</div>`).join('')}
        ${agent.typing?`<div class="typing-dots"><span></span><span></span><span></span></div>`:''}
      </div>
      ${showChips?`<div class="agent-chips">${chips.map((c,i)=>`<button class="agent-chip" style="animation-delay:${.15+i*.08}s" onclick="agentQuick('${c.replace(/'/g,"\\'")}')">${esc(c)}</button>`).join('')}</div>`:''}
      ${limited
        ? `<div style="padding:12px;border-top:1px solid var(--line);"><button onclick="toggleAgent();nav('tarifs')" class="btn btn-gold btn-block btn-sm">${I('crown',14)} Débloquer Worthy en illimité — 2,99 €/mois</button></div>`
        : `<div class="agent-input-row">
            <input id="agent-input" class="agent-input" placeholder="Ex : une veste à 89 €…" onkeydown="agentKeydown(event)" ${agent.typing?'disabled':''}/>
            <button class="agent-send" onclick="sendAgentFromInput()" aria-label="Envoyer">${I('arrowRight',17)}</button>
          </div>`}
    </div>`:''}
    <button class="agent-fab" onclick="toggleAgent()" aria-label="${agent.open?'Fermer l’assistant':'Ouvrir l’assistant Worthy'}" aria-expanded="${agent.open}">
      <span class="fab-icon ${agent.open?'hidden-icon':''}">${I('brain',24,1.6)}</span>
      <span class="fab-icon ${agent.open?'':'hidden-icon'}">${I('x',22,1.9)}</span>
      ${limited?`<span class="fab-lock">${I('crown',9)} PRO</span>`:''}
    </button>`;
  const msgs = document.getElementById('agent-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
  const input = document.getElementById('agent-input');
  if(input && agent.open && !agent.typing && agent.messages.length>1) input.focus();
